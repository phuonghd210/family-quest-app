<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>⚔️ Bảng Theo dõi điểm thưởng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Nunito', 'Baloo 2', sans-serif;
      background: var(--bg-page);
      color: var(--text);
      font-size: 16px;
    }

    /* ============================================================
       CSS VARIABLES — Light Theme · Demon Slayer
    ============================================================ */
    :root {
      /* Backgrounds */
      --bg-page:    #f0fdf4;
      --bg-card:    #ffffff;
      --bg-surface: #f9fafb;
      --bg-nav:     #ffffff;

      /* Green — Tanjiro */
      --green:      #16a34a;
      --green-l:    #22c55e;
      --green-bg:   #dcfce7;

      /* Pink — Nezuko */
      --pink:       #ec4899;
      --pink-l:     #f472b6;
      --pink-bg:    #fce7f3;

      /* Accent */
      --gold:       #f59e0b;
      --gold-bg:    #fef3c7;
      --blue:       #3b82f6;
      --blue-bg:    #dbeafe;
      --red:        #ef4444;
      --red-l:      #f87171;

      /* Text */
      --text:       #1e293b;
      --dim:        #64748b;
      --text-light: #94a3b8;

      /* Border & Shadow */
      --border:     rgba(0,0,0,0.08);
      --shadow-sm:  0 2px 8px rgba(0,0,0,0.08);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
      --shadow-lg:  0 8px 32px rgba(0,0,0,0.15);

      --radius: 20px;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes floatUp { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

    /* ============================================================
       LOADING
    ============================================================ */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(240,253,244,0.92);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      backdrop-filter: blur(6px);
    }
    #loading span { color: var(--dim); font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--green-bg);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ============================================================
       TOAST
    ============================================================ */
    #toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 700; z-index: 8888;
      opacity: 0; transition: opacity 0.3s;
      max-width: 90vw; text-align: center;
      box-shadow: var(--shadow-md);
      pointer-events: none;
      font-family: 'Nunito', sans-serif;
    }
    #toast.show    { opacity: 1; }
    #toast.success { background: var(--green); color: #fff; }
    #toast.error   { background: var(--red);   color: #fff; }
    #toast.warn    { background: var(--gold);   color: #fff; }

    /* ============================================================
       MODAL
    ============================================================ */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 7777;
      background: rgba(0,0,0,0.40);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--bg-card); border-radius: 20px;
      padding: 28px 24px; max-width: 340px; width: 90%;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.22s ease;
    }
    .modal-box h3 {
      margin-bottom: 10px; font-size: 18px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif; color: var(--text);
    }
    .modal-box p  { color: var(--dim); font-size: 14px; margin-bottom: 24px; line-height: 1.55; }
    .modal-btns   { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 12px; border-radius: 14px;
      border: none; cursor: pointer; font-size: 14px; font-weight: 700;
      transition: all 0.2s ease; font-family: 'Nunito', sans-serif;
    }
    .modal-btns button:hover  { transform: scale(1.03); }
    .modal-btns button:active { transform: scale(0.97); }
    .btn-confirm {
      background: linear-gradient(135deg, var(--green), #15803d);
      color: #fff;
      box-shadow: 0 4px 12px rgba(22,163,74,0.3);
    }
    .btn-cancel { background: #f1f5f9; color: var(--dim); }

    /* ============================================================
       LOGIN — id="loginScreen"
    ============================================================ */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative; overflow: hidden;
      background: #f0fdf4;
    }

    /* ── Decorative split halves ── */
    .login-deco-left,
    .login-deco-right {
      position: absolute; top: 0; height: 100%; width: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 0; overflow: hidden; pointer-events: none;
    }
    .login-deco-left  { left: 0;  background: var(--green-bg); }
    .login-deco-right { right: 0; background: var(--pink-bg);  }

    .deco-inner      { text-align: center; padding: 24px; user-select: none; }
    .deco-char       {
      font-size: 76px; display: block; line-height: 1; margin-bottom: 14px;
      animation: floatUp 3.5s ease-in-out infinite;
    }
    .deco-jp         {
      font-size: 19px; font-weight: 800; font-style: italic;
      font-family: 'Baloo 2', sans-serif; letter-spacing: 3px; margin-bottom: 10px;
    }
    .login-deco-left  .deco-jp { color: var(--green); }
    .login-deco-right .deco-jp { color: var(--pink);  }
    .deco-emojis { font-size: 22px; letter-spacing: 8px; opacity: 0.60; }

    /* ── Login card ── */
    .login-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%; max-width: 384px;
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 2;
      animation: fadeIn 0.4s ease;
    }
    .login-logo { text-align: center; margin-bottom: 22px; }
    .login-card-header {
      background: linear-gradient(135deg, var(--green-bg), var(--pink-bg));
      border-radius: 16px; padding: 16px 12px; margin-bottom: 4px;
    }
    .login-logo .logo-icon {
      font-size: 52px; display: block; margin-bottom: 8px; line-height: 1;
      animation: floatUp 3s ease-in-out infinite;
    }
    .login-logo h1 {
      font-size: 20px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      background: linear-gradient(135deg, var(--green), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo p  { font-size: 13px; color: var(--dim); margin-top: 6px; font-family: 'Nunito', sans-serif; }

    .chars-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .char-btn {
      flex: 1; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 14px;
      padding: 12px 8px; cursor: pointer; text-align: center;
      transition: all 0.2s ease; color: var(--text); min-height: 80px;
    }
    .char-btn:hover  { border-color: var(--green-l); background: var(--green-bg); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .char-btn.active { border-color: var(--gold); background: var(--gold-bg); }
    .char-btn .char-icon { font-size: 28px; display: block; margin-bottom: 4px; }
    .char-btn .char-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .char-btn .char-role { font-size: 11px; color: var(--dim); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--dim); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; color: var(--text); font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px;
      min-width: 32px; min-height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .login-error {
      background: #fee2e2; border: 1px solid var(--red-l);
      border-radius: 12px; padding: 10px 14px;
      font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; font-weight: 700;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--green), #15803d);
      color: white; border: none; border-radius: 999px; padding: 14px;
      font-size: 17px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      cursor: pointer; transition: all 0.2s ease; margin-top: 6px;
      box-shadow: 0 4px 16px rgba(22,163,74,0.35);
      letter-spacing: 0.5px; min-height: 50px;
    }
    .btn-login:hover  { transform: scale(1.03); box-shadow: 0 6px 24px rgba(22,163,74,0.45); }
    .btn-login:active { transform: scale(0.97); }

    @media (max-width: 480px) {
      .login-deco-left,
      .login-deco-right { display: none; }
      #loginScreen { background: var(--bg-page); padding: 16px; }
    }

    /* ============================================================
       APP — id="mainApp"
    ============================================================ */
    #mainApp { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
    #mainApp.visible { display: flex; }

    /* ── Header ── */
    .app-header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; box-shadow: var(--shadow-sm);
    }
    .app-header h1 { font-size: 18px; font-weight: 800; font-family: 'Baloo 2', sans-serif; color: var(--green); }
    .header-right  { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      font-size: 12px; color: var(--green); font-weight: 700;
      background: var(--green-bg); border-radius: 999px; padding: 5px 12px;
    }
    .btn-logout {
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--dim); border-radius: 999px;
      padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 600;
      transition: all 0.2s ease; min-height: 32px;
    }
    .btn-logout:hover { color: var(--red); border-color: var(--red-l); background: #fee2e2; }
    .btn-refresh {
      background: none; border: none; color: var(--dim);
      font-size: 20px; cursor: pointer; padding: 6px; transition: all 0.2s ease;
      border-radius: 999px; min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-refresh:hover   { background: var(--green-bg); color: var(--green); }
    .btn-refresh.spinning { animation: spin 0.6s linear; }

    /* ── Content area ── */
    .tab-content-area { flex: 1; overflow-y: auto; padding: 16px 16px 80px; background: var(--bg-page); }

    /* ============================================================
       TAB PANELS — class="tab-panel"
    ============================================================ */
    .tab-panel        { display: none; animation: fadeIn 0.25s ease; }
    .tab-panel.active { display: block; }

    /* ── Tab nav ── */
    .tab-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 60px; min-height: 60px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 6px; background: none; border: none;
      color: var(--dim); cursor: pointer;
      font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif;
      gap: 2px; transition: color 0.2s; white-space: nowrap;
      position: relative;
    }
    .tab-btn .tab-icon { font-size: 22px; line-height: 1.2; }
    .tab-btn.active    { color: var(--green); }
    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: 5px;
      left: 50%; transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--green); border-radius: 50%;
    }

    /* ── Section title ── */
    .sec-title {
      font-size: 18px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif;
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      color: var(--text);
    }

    /* ============================================================
       TAB: TODAY
    ============================================================ */
    .leaders-banner {
      background: linear-gradient(135deg, var(--green-bg), var(--pink-bg));
      border: 1px solid rgba(22,163,74,0.12);
      border-radius: 20px; padding: 16px;
      margin-bottom: 16px; display: flex; gap: 12px;
      box-shadow: var(--shadow-sm);
    }
    .leader-item {
      flex: 1; background: rgba(255,255,255,0.72);
      border-radius: 14px; padding: 12px 14px;
    }
    .leader-label { font-size: 11px; color: var(--dim); display: block; margin-bottom: 4px; font-weight: 700; }
    .leader-name  { font-size: 15px; font-weight: 800; color: var(--green); font-family: 'Baloo 2', sans-serif; }

    .child-cards { display: flex; flex-direction: column; gap: 14px; }
    .child-card  {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--green);
      border-radius: 20px; padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .child-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .child-card-avatar { font-size: 40px; line-height: 1; }
    .child-card-info h3   { font-size: 18px; font-weight: 800; font-family: 'Baloo 2', sans-serif; color: var(--text); }
    .child-card-info span { font-size: 12px; color: var(--dim); font-weight: 600; }

    .score-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .score-box {
      border-radius: 16px; padding: 12px 6px; text-align: center;
      border: 1px solid var(--border);
    }
    .score-box:nth-child(1) { background: var(--green-bg); }
    .score-box:nth-child(2) { background: var(--gold-bg);  }
    .score-box:nth-child(3) { background: var(--blue-bg);  }
    .score-box .sv {
      font-size: 22px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif;
      color: var(--green);
    }
    .score-box:nth-child(2) .sv { color: var(--gold); }
    .score-box:nth-child(3) .sv { color: var(--blue); }
    .score-box .sl { font-size: 11px; color: var(--dim); margin-top: 3px; font-weight: 600; }

    .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 6px; font-weight: 700; }
    .prog-bar   { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); border-radius: 999px; transition: width 0.5s ease; }

    /* ============================================================
       TAB: TASKS
    ============================================================ */
    #tab-tasks {
      background: #ffffff;
      margin: -16px -16px 0 -16px;
      padding: 16px 16px 0 16px;
    }

    .cat-filter { margin-bottom: 16px; }
    .cat-filter label {
      display: block; margin-bottom: 6px;
      color: var(--dim); font-size: 12px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .cat-filter-select {
      width: 100%; min-height: 42px; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 12px;
      background: #fff; color: var(--text);
      font-size: 14px; font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .cat-section       { margin-bottom: 22px; }
    .cat-section-title { font-size: 12px; font-weight: 800; color: var(--dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }

    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .task-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .task-item-head  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .task-name-text  { font-size: 15px; font-weight: 700; color: var(--text); }
    .task-pts-badge  {
      background: var(--gold-bg); color: var(--gold);
      border-radius: 999px; padding: 3px 10px;
      font-size: 12px; font-weight: 800;
      border: 1px solid rgba(245,158,11,0.2);
    }

    .task-checks { display: flex; gap: 8px; flex-wrap: wrap; }
    .check-label {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-surface); border-radius: 10px;
      padding: 8px 14px; cursor: pointer;
      border: 2px solid var(--border);
      transition: all 0.2s ease; user-select: none;
      min-height: 44px;
    }
    .check-label:hover:not(.readonly) { border-color: var(--green-l); transform: scale(1.02); box-shadow: var(--shadow-sm); }
    .check-label.done  { background: var(--green-bg); border-color: var(--green); }
    .check-label input[type="checkbox"] { display: none; }
    .check-box {
      width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; transition: all 0.2s ease; background: white;
    }
    .check-label.done .check-box { background: var(--green); border-color: var(--green); color: white; font-size: 13px; }
    .check-child-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .check-label.readonly { cursor: default; pointer-events: none; opacity: 0.72; }

    /* ============================================================
       TAB: POINTS
    ============================================================ */
    .points-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px;
      box-shadow: var(--shadow-sm); margin-bottom: 4px;
    }
    .form-row   { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; font-weight: 700; color: var(--dim); margin-bottom: 7px; }
    .form-select, .form-input {
      width: 100%; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      padding: 11px 14px; color: var(--text); font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-select:focus, .form-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.10); }
    .type-toggle { display: flex; gap: 10px; }
    .type-btn {
      flex: 1; padding: 11px; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      color: var(--dim); cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif;
      transition: all 0.2s ease; min-height: 46px;
    }
    .type-btn:hover  { transform: scale(1.03); }
    .type-btn:active { transform: scale(0.97); }
    .type-btn.active-bonus   { background: var(--green-bg); border-color: var(--green); color: var(--green); box-shadow: 0 2px 8px rgba(22,163,74,0.18); }
    .type-btn.active-penalty { background: #fee2e2; border-color: var(--red); color: var(--red); box-shadow: 0 2px 8px rgba(239,68,68,0.15); }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--green), #15803d);
      color: white; border: none; border-radius: 14px; padding: 14px;
      font-size: 16px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      cursor: pointer; margin-top: 4px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.28);
      transition: all 0.2s ease; min-height: 48px;
    }
    .btn-submit:hover  { transform: scale(1.02); box-shadow: 0 6px 20px rgba(22,163,74,0.38); }
    .btn-submit:active { transform: scale(0.97); }

    .recent-tx { margin-top: 20px; }
    .tx-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--bg-card);
      border-radius: 14px; border: 1px solid var(--border);
      margin-bottom: 8px; font-size: 13px;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .tx-item:hover { box-shadow: var(--shadow-md); }
    .tx-left .tx-name { font-weight: 700; color: var(--text); }
    .tx-left .tx-meta { font-size: 11px; color: var(--dim); margin-top: 3px; font-weight: 600; }
    .tx-pts     { font-weight: 800; font-size: 16px; font-family: 'Baloo 2', sans-serif; }
    .tx-pts.pos { color: var(--green); }
    .tx-pts.neg { color: var(--red); }

    /* ============================================================
       TAB: REWARDS
    ============================================================ */
    .rewards-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
    .reward-card  {
      background: var(--bg-card); border: 2px solid var(--pink-l);

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxziVCpBIl9jm9TVxnDZYn9vcX2Vk5vnaT_KyO2VmpthmJvy3lAUah4Ai1vpvDPXwV_/exec';

function safeParseUser(raw) {

const THEME_DEFAULT_ID = 'default';
const THEME_STORAGE_KEY = 'fq_theme_id';

let S = {

// ============================================================

const THEME_REGISTRY = {

  },

    vars: {
      '--bg-page':    '#eff6ff',

      '--bg-surface': '#f0f9ff',

      '--red-l':      '#f87171',

      '--dim':        '#475569',
      '--text-light': '#94a3b8',
      '--border':     'rgba(14,165,233,0.16)',
      '--shadow-sm':  '0 2px 8px rgba(14,165,233,0.10)',
      '--shadow-md':  '0 4px 16px rgba(14,165,233,0.14)',
      '--shadow-lg':  '0 8px 32px rgba(14,165,233,0.18)',

function getThemeById(themeId) {
  const id = String(themeId || '').trim();
  if (id && THEME_REGISTRY[id]) return THEME_REGISTRY[id];
  return THEME_REGISTRY[THEME_DEFAULT_ID];
}

function getStoredThemeId() {
  const id = String(localStorage.getItem(THEME_STORAGE_KEY) || '').trim();
  return id && THEME_REGISTRY[id] ? id : '';
}

function setTextById(id, value) {
  const el = document.getElementById(id);
  if (!el || typeof value !== 'string') return;
  el.textContent = value;
}

function applyThemeContent(theme) {
  const content = theme?.content || THEME_REGISTRY[THEME_DEFAULT_ID].content || {};
  const login = content.login || {};
  const tabs = content.tabs || {};

  if (content.appTitle) document.title = content.appTitle;
  setTextById('loading-text', content.loadingText);
  setTextById('login-deco-left-char', login.leftChar);
  setTextById('login-deco-left-title', login.leftTitle);
  setTextById('login-deco-left-emojis', login.leftEmojis);
  setTextById('login-deco-right-char', login.rightChar);
  setTextById('login-deco-right-title', login.rightTitle);
  setTextById('login-deco-right-emojis', login.rightEmojis);
  setTextById('login-logo-icon', login.logoIcon);
  setTextById('login-title', login.title);
  setTextById('login-subtitle', login.subtitle);
  setTextById('login-submit', login.submitText);
  setTextById('tab-icon-today', tabs.today);
  setTextById('tab-icon-tasks', tabs.tasks);
  setTextById('tab-icon-points', tabs.points);
  setTextById('tab-icon-rewards', tabs.rewards);
  setTextById('tab-icon-rankings', tabs.rankings);
  setTextById('tab-icon-history', tabs.history);
}

function getThemeLoginUsers() {
  const theme = getThemeById(S.themeId);
  const users = theme?.content?.login?.users;
  return Array.isArray(users) && users.length ? users : THEME_REGISTRY[THEME_DEFAULT_ID].content.login.users;
}

function applyThemeById(themeId) {
  const theme = getThemeById(themeId);
  const vars = theme?.vars || {};
  const rootStyle = document.documentElement.style;

  Object.entries(vars).forEach(([key, value]) => {
    if (!key || typeof key !== 'string') return;
    if (!key.startsWith('--')) return;
    if (typeof value !== 'string' || !value.trim()) return;
    rootStyle.setProperty(key, value);
  });

  S.themeId = theme.id || THEME_DEFAULT_ID;
  applyThemeContent(theme);
  return S.themeId;
}

function saveThemePreference(themeId) {
  const appliedThemeId = applyThemeById(themeId);
  localStorage.setItem(THEME_STORAGE_KEY, appliedThemeId);
  return appliedThemeId;
}

function previewTheme(themeId) {
  const appliedThemeId = saveThemePreference(themeId);
  renderTab(S.activeTab);
  toast('Đã lưu theme: ' + getThemeById(appliedThemeId).label, 'success');
}

function clearThemePreference() {
  localStorage.removeItem(THEME_STORAGE_KEY);
  const appliedThemeId = applyThemeById(S.backendThemeId || THEME_DEFAULT_ID);
  renderTab(S.activeTab);
  toast('Đã dùng lại theme Google Sheet: ' + getThemeById(appliedThemeId).label, 'success');
}

S.themeId = getStoredThemeId() || THEME_DEFAULT_ID;
S.backendThemeId = THEME_DEFAULT_ID;
applyThemeById(S.themeId);
  
// ============================================================
// API
// ============================================================
const ApiClient = {
  classifyError(error, httpStatus = null, action = '') {
    if (httpStatus && Number.isFinite(httpStatus)) return 'http';
    const msg = String(error?.message || '').toLowerCase();

    if (
      msg.includes('failed to fetch') ||
      msg.includes('networkerror') ||
      msg.includes('load failed') ||
      msg.includes('network')
    ) return 'network';

    if (action === 'login' || action === 'validateSession') return 'auth';
    if (msg.includes('json') || msg.includes('parse')) return 'parse';
    return 'unknown';
  },

  logEvent(event = {}) {
    try {
      console.log('[apiClient]', {
        ts: new Date().toISOString(),
        layer: event.layer || 'api',
        action: event.action || '',
        severity: event.severity || 'info',
        error_type: event.error_type || null,
        http_status: event.http_status ?? null,
        message: event.message || '',
        meta: event.meta || {}
      });
    } catch (_e) {}
  },

  async request({ apiUrl, action, token = null, payload = {} }) {
    const startedAt = Date.now();
    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        body: JSON.stringify({ action, token, payload })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const data = await res.json();

      if (!data || typeof data !== 'object') {
        throw new Error('Invalid response envelope');
      }

      this.logEvent({
        action,
        severity: 'info',
        message: 'request_success',
        meta: { duration_ms: Date.now() - startedAt }
      });

      return data;
    } catch (error) {
      this.logEvent({
        action,
        severity: 'error',
        error_type: this.classifyError(error, null, action),
        message: String(error?.message || error),
        meta: { duration_ms: Date.now() - startedAt }
      });
      throw error;
    }
  }
};
  
async function api(action, payload = {}) {
  return ApiClient.request({
    apiUrl: API_URL,
    action,
    token: S.token,
    payload
  });
}

// FETCH DATA
// ============================================================
async function fetchData(silent = false) {
  if (!silent) showLoad(true);
  try {
    const r = await api('getInitialData');
    if (r.success) {
      S.children     = (r.children     || []).filter(c => c.status === 'active' || !c.status);
      S.tasks        = (r.tasks        || []).filter(t => t.status === 'active');
      S.rewards      = (r.rewards      || []).filter(rw => rw.status === 'active');
      S.transactions = r.transactions  || [];
      S.dailyStatus  = r.dailyStatus   || [];
      S.redemptions  = r.redemptions   || [];
      S.today        = r.today         || '';
      S.week_start   = r.week_start    || '';
      const backendThemeId =
        r?.theme_config?.theme_id ||
        r?.settings?.theme_id ||
        THEME_DEFAULT_ID;
      S.backendThemeId = getThemeById(backendThemeId).id || THEME_DEFAULT_ID;
      applyThemeById(getStoredThemeId() || S.backendThemeId);
      renderTab(S.activeTab);
    } else {
      if (!silent) toast(r.message || 'Không tải được dữ liệu', 'error');
    }
  } catch(e) {
    console.error('fetchData error:', e); // ✅ luôn log dù silent
    if (!silent) toast('⚠️ Không kết nối được server', 'error');
  }
  if (!silent) showLoad(false);
}

async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  await fetchData(true);
  btn.classList.remove('spinning');
  toast('Đã làm mới dữ liệu ✅', 'success');
}

// ============================================================
// SCORE / TASK HELPERS
// ============================================================
function childScore(childId) {
  const c = S.children.find(x => String(x.child_id) === String(childId));
  if (!c) return { today_score:0, week_score:0, total_score:0, earned_score:0, daily_target:50 };
  return {
    today_score:  Number(c.today_score  || 0),
    week_score:   Number(c.week_score   || 0),
    total_score:  Number(c.total_score  || 0),
    earned_score: Number(c.earned_score || 0),
    daily_target: Number(c.daily_target || 50)
  };
}

function txDateKey(tx) {
  return String(tx.date || tx.created_at || '').substring(0, 10);
}

function isRedeemTransaction(tx) {
  const type = String(tx.type || '').toLowerCase();
  return type.includes('redeem') || type.includes('redemption') || type.includes('reward');
}

function transactionScoreForChild(childId, { fromDate = '', toDate = '' } = {}) {
  return S.transactions
    .filter(tx => {
      const txDay = txDateKey(tx);
      return String(tx.child_id) === String(childId) &&
        !isRedeemTransaction(tx) &&
        (!fromDate || txDay >= fromDate) &&
        (!toDate || txDay <= toDate);
    })
    .reduce((sum, tx) => sum + Number(tx.points || 0), 0);
}

function childDisplayScore(childId) {
  const c = childScore(childId);
  return {
    ...c,
    today_score: S.today
      ? transactionScoreForChild(childId, { fromDate: S.today, toDate: S.today })
      : c.today_score,
    week_score: S.week_start && S.today
      ? transactionScoreForChild(childId, { fromDate: S.week_start, toDate: S.today })
      : c.week_score
  };
}

function scoreBarWidth(value, maxVal) {
  return Math.max(0, Math.round(Number(value || 0) / maxVal * 100));
}
  
function formatTaskPoints(points) {
  const pts = Number(points || 0);
  return `${pts > 0 ? '+' : ''}${pts} ⭐`;
}
  
function isTaskDone(childId, taskId) {
  return S.dailyStatus.some(ds =>
    String(ds.child_id) === String(childId) &&
    String(ds.task_id)  === String(taskId)  &&
    (ds.status === 'done' || ds.status === 'completed')
  );
}

function taskAppliesTo(task, child) {
  const at = String(task.assigned_to || 'both').toLowerCase();
  if (at === 'both') return true;
  return at === String(child.child_id).toLowerCase() ||
         at === String(child.child_key || '').toLowerCase();
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value.trim();
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!username || !password) { toast('Nhập username và password', 'warn'); return; }
  showLoad(true);
  try {
    const r = await api('login', { username, password });
    if (r.success) {
      S.token = r.token;
      S.user  = { user_id: r.user_id, username: r.username, display_name: r.display_name, role: r.role, child_id: r.child_id || null };
      localStorage.setItem('fq_token', r.token);
      localStorage.setItem('fq_user',  JSON.stringify(S.user));
      showApp();
      await fetchData(true);
    } else {
      errEl.style.display = 'block';
    }
  } catch(err) {
    console.error('login error:', err);
    toast('⚠️ Không kết nối được server', 'error');
  }
  showLoad(false);
}

function handleLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('fq_token');
  localStorage.removeItem('fq_user');
  showLogin();
}

/**
 * Escape text before injecting into innerHTML templates.
 * Minimal XSS hardening without changing UI behavior.
 */

  return String(v ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function fmtDatetime(d) {

  const TASK_CATEGORY_ICONS = {
  'Tác phong hằng ngày': '🌅',
  'Việc nhà': '🏠',
  'Học tập': '📚',
  'Điểm phát sinh': '⚡',
  'Thành tích': '🏆',
  'Hành vi trừ điểm': '🚫',
  'Khác': '🏷️'
};

const TASK_CATEGORY_SHORT_LABELS = {
  'Tác phong hằng ngày': 'Tác phong',
  'Điểm phát sinh': 'Phát sinh'
};

const DEFAULT_TASK_CATEGORIES = [
  'Tác phong hằng ngày',
  'Việc nhà',
  'Học tập',
  'Điểm phát sinh',
  'Thành tích',
  'Hành vi trừ điểm'
];

function taskCategoryKey(task) {
  return String(task?.category || 'Khác').trim() || 'Khác';
}

function taskCategoryLabel(category) {
  const key = String(category || 'Khác');
  const icon = TASK_CATEGORY_ICONS[key] || '🏷️';
  const label = TASK_CATEGORY_SHORT_LABELS[key] || key;
  return `${icon} ${label}`;
}

function taskCategoryKeys(tasks = S.tasks) {
  const seen = new Set();
  const keys = [];
  const addKey = key => {
    if (seen.has(key)) return;
    seen.add(key);
    keys.push(key);
  };

  DEFAULT_TASK_CATEGORIES.forEach(addKey);
  (tasks || []).forEach(task => addKey(taskCategoryKey(task)));
  return keys;
}
  function tasksBuildFilterHtml(taskFilter) {
  const cats = [
      { key: 'all', label: '🔍 Tất cả' },
          ...taskCategoryKeys().map(key => ({ key, label: taskCategoryLabel(key) }))
  ];

  return `
    <div class="cat-filter">
      <label for="task-category-filter">Lọc nhóm đánh giá</label>
      <select id="task-category-filter" class="cat-filter-select" onchange="setTaskFilter(this.value)">
        ${cats.map(c => `
          <option value="${esc(c.key)}" ${taskFilter === c.key ? 'selected' : ''}>${esc(c.label)}</option>
        `).join('')}
      </select>
    </div>
  `;
}

function tasksBuildPendingBarHtml({ canInteract }) {
  if (!canInteract) return '';
  const pendingCount = getPendingTaskChangeList().length;
  const disabledAttr = (pendingCount === 0 || S.isSubmittingTasks) ? 'disabled' : '';

  return `
    <div class="pending-bar" style="display:flex;gap:8px;align-items:center;justify-content:space-between;margin:10px 0 12px;">
      <span>📝 Chờ xác nhận: <b>${pendingCount}</b></span>
      <div style="display:flex;gap:8px;">
        <button class="btn-submit" type="button" data-task-action="submit" ${disabledAttr}>✅ Xác nhận</button>
        <button class="btn-cancel" type="button" data-task-action="cancel" ${disabledAttr}>↩️ Hủy</button>
      </div>
    </div>
  `;
}

function tasksGroupByCategory(tasks) {
  const groups = {};
  tasks.forEach(t => {
    const cat = taskCategoryKey(t);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });
  return groups;
}

function tasksBuildChildCheckHtml({ child, task, done, canInteract }) {
  return `
    <label
      id="lbl-${child.child_id}-${task.task_id}"
      class="task-check ${done ? 'done' : ''} ${canInteract ? '' : 'disabled'}"
      data-child-id="${esc(child.child_id)}"
      data-task-id="${esc(task.task_id)}"
      data-is-done="${done ? '1' : '0'}"
      ${canInteract ? 'onclick="handleTaskToggleClick(event)"' : ''}>
      <span class="check-icon">${done ? '✅' : '⬜'}</span>
      <span class="check-name">${esc(child.avatar_icon || '')} ${esc(child.child_name)}</span>
    </label>
  `;
}

function taskPendingKey(childId, taskId) {
  return `${String(childId)}::${String(taskId)}`;
}

function getEffectiveTaskDone(childId, taskId) {
  const key = taskPendingKey(childId, taskId);
  const p = S.pendingTaskChanges?.[key];
  if (p) return !!p.toDone;
  return isTaskDone(childId, taskId);
}

function getPendingTaskChangeList() {
  return Object.values(S.pendingTaskChanges || {});
}

function upsertPendingTaskChange(childId, taskId, currentDone) {
  if (!S.pendingTaskChanges) S.pendingTaskChanges = {};
  const key = taskPendingKey(childId, taskId);
  const existing = S.pendingTaskChanges[key];

  if (!existing) {
    S.pendingTaskChanges[key] = {
      child_id: String(childId),
      task_id: String(taskId),
      fromDone: !!currentDone,
      toDone: !currentDone
    };
    return;
  }

  existing.toDone = !existing.toDone;
  if (existing.toDone === existing.fromDone) delete S.pendingTaskChanges[key];
}

function resetPendingTaskChanges() {
  S.pendingTaskChanges = {};
}

function setTaskFilter(key) {
  S.taskFilter = key;
  renderTasks();
}


function handleTaskPendingActionClick(event) {
  const btn = event.target.closest('[data-task-action]');
  if (!btn) return false;
  const action = btn.dataset.taskAction;
  if (action === 'submit') submitPendingTasks();
  if (action === 'cancel') cancelPendingTasks();
  return true;
}

function handleTasksContainerClick(event) {
  // Ưu tiên nút action trước
  if (handleTaskPendingActionClick(event)) return;
}

function bindTaskTabClickOnce() {
  const el = document.getElementById('tab-tasks');
  if (!el) return;
  if (el.dataset.taskClickBound === '1') return;
  el.addEventListener('click', handleTasksContainerClick);
  el.dataset.taskClickBound = '1';
}

function renderTasks() {
  const el = document.getElementById('tab-tasks');
  if (!el) return;

  try {
    const canInteract = S.user?.role === 'admin' || S.user?.role === 'scorer';
    const activeTasks = S.tasks.filter(t => S.taskFilter === 'all' || taskCategoryKey(t) === S.taskFilter);
    const groups = tasksGroupByCategory(activeTasks);

    let html = `
      <div class="sec-title">📝 Đánh Giá Hôm Nay</div>
      ${tasksBuildPendingBarHtml({ canInteract })}
      ${tasksBuildFilterHtml(S.taskFilter)}
    `;

    if (!activeTasks.length) {
      html += '<div class="empty-state"><div class="es-icon">📜</div><p>Không có nhiệm vụ nào</p></div>';
      el.innerHTML = html;
      return;
    }

    Object.entries(groups).forEach(([cat, tasks]) => {
      html += `<div class="cat-section"><div class="cat-section-title">${esc(cat)}</div>`;

      tasks.forEach(task => {
        const applicable = S.children.filter(c => taskAppliesTo(task, c));
        if (!applicable.length) return;

        html += `
          <div class="task-item">
            <div class="task-item-head">
              <span class="task-name-text">${esc(task.task_name)}</span>
              <span class="task-pts-badge">${formatTaskPoints(task.points)}</span>
            </div>
            <div class="task-checks">
        `;

        applicable.forEach(child => {
          const done = getEffectiveTaskDone(child.child_id, task.task_id);
          html += tasksBuildChildCheckHtml({ child, task, done, canInteract });
        });

        html += `</div></div>`;
      });

      html += `</div>`;
    });

    el.innerHTML = html;
  } catch (err) {
    console.error('renderTasks fatal:', err);
    el.innerHTML = '<div class="empty-state"><div class="es-icon">⚠️</div><p>Lỗi hiển thị Đánh giá. Mở Console để xem chi tiết.</p></div>';
  }
}

function handleTaskToggleClick(e) {
  const el = e?.currentTarget;
  const childId = el?.dataset?.childId || '';
  const taskId = el?.dataset?.taskId || '';
  const isDone = el?.dataset?.isDone === '1';

  if (!childId || !taskId) {
    toast('Thiếu dữ liệu nhiệm vụ', 'error');
    return;
  }

  if (S.user?.role !== 'admin' && S.user?.role !== 'scorer') return;
  if (S.isSubmittingTasks) return;

  upsertPendingTaskChange(childId, taskId, isDone);
  renderTasks();
}

function cancelPendingTasks() {
  if (S.isSubmittingTasks) return;
  resetPendingTaskChanges();
  renderTasks();
  toast('Đã hủy các thay đổi chờ xác nhận', 'warn');
}

async function submitPendingTasks() {
  if (S.user?.role !== 'admin' && S.user?.role !== 'scorer') return;
  if (S.isSubmittingTasks) return;

  const changes = getPendingTaskChangeList();
  if (!changes.length) {
    toast('Không có thay đổi để xác nhận', 'warn');
    return;
  }
    const completeItems = changes
    .filter(c => c.toDone)
    .map(c => ({ child_id: c.child_id, task_id: c.task_id }));
  const undoItems = changes
    .filter(c => !c.toDone)
    .map(c => ({ child_id: c.child_id, task_id: c.task_id }));

  S.isSubmittingTasks = true;
  showLoad(true);

  let ok = 0;
  const fail = [];

  try {
        const groups = [
      { type: 'complete', items: completeItems },
      { type: 'undo', items: undoItems }
    ].filter(g => g.items.length > 0);


    for (let i = 0; i < groups.length; i++) {
      const g = groups[i];
      toast(`Đang gửi batch ${i + 1}/${groups.length}...`, 'info');

      try {
        const r = await api('bulkUpdateTasks', { type: g.type, items: g.items });
        const results = Array.isArray(r?.results) ? r.results : [];

        if (!r?.success) {
          g.items.forEach(item => fail.push({
            ...item,
            toDone: g.type === 'complete',
            message: r?.message || 'Lỗi không xác định'
          }));
          continue;
        }

        const failByKey = {};
        results.forEach(item => {
          if (!item?.success) {
            failByKey[taskPendingKey(item.child_id, item.task_id)] = item.message || 'Lỗi không xác định';
          }
        });

        g.items.forEach(item => {
          const key = taskPendingKey(item.child_id, item.task_id);
          if (failByKey[key]) {
            fail.push({ ...item, toDone: g.type === 'complete', message: failByKey[key] });
          } else {
            ok++;
          }
        });
      } catch (err) {
        g.items.forEach(item => fail.push({
          ...item,
          toDone: g.type === 'complete',
          message: 'Lỗi kết nối'
        }));
      }
    }

    await fetchData(true);

    if (fail.length === 0) {
      resetPendingTaskChanges();
      renderTasks();
      toast(`✅ Đã xác nhận ${ok}/${changes.length} thay đổi`, 'success');
      return;
    }

    const retryMap = {};
    fail.forEach(f => {
      const k = taskPendingKey(f.child_id, f.task_id);
      retryMap[k] = {
        child_id: f.child_id,
        task_id: f.task_id,
        fromDone: !f.toDone,
        toDone: f.toDone
      };
    });
    S.pendingTaskChanges = retryMap;
    renderTasks();
    toast(`⚠️ Thành công ${ok}/${changes.length}, lỗi ${fail.length}. Có thể thử lại.`, 'warn');
  } finally {
    S.isSubmittingTasks = false;
    showLoad(false);
  }
}

  function renderHistory() {
  const el = document.getElementById('tab-history');
  if (!S.children.length || !S.today) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">📅</div><p>Đang tải...</p></div>';
    return;
  }
  const days = Number(S.historyDays) === 30 ? 30 : 7;

const historyFilterHtml = `
  <div class="form-row" style="margin-bottom:12px">
    <label>🗂️ Khoảng thời gian</label>
    <select class="form-select" onchange="setHistoryDays(this.value)">
      <option value="7" ${days === 7 ? 'selected' : ''}>7 ngày gần đây</option>
      <option value="30" ${days === 30 ? 'selected' : ''}>30 ngày gần đây</option>
    </select>
  </div>
`;
  const dayData = [];
  for (let i = days-1; i >= 0; i--) {
    const d  = new Date(S.today + 'T00:00:00');
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().substring(0,10);
    const entry = { date: ds, short: `${d.getDate()}/${d.getMonth()+1}`, scores: {} };
    S.children.forEach(c => {
      entry.scores[c.child_id] = S.transactions
  .filter(tx => {
    const txDay = String(tx.date || tx.created_at || '').substring(0,10);
    return String(tx.child_id) === String(c.child_id) && txDay === ds;
  })
  .reduce((sum,tx) => sum + Number(tx.points || 0), 0);
    });
    dayData.push(entry);
  }

  const allVals  = dayData.flatMap(d => Object.values(d.scores));
  const maxVal   = Math.max(...allVals, 1);
  const colors   = ['var(--red)','var(--blue)','var(--green)'];

  const barsHtml = dayData.map(d => {
    const childBars = S.children.map((c,i) => {
      const h = Math.max(4, Math.round((d.scores[c.child_id] / maxVal) * 100));
      return `<div class="bar b${i+1}" style="height:${h}px" title="${esc(c.child_name)}: ${d.scores[c.child_id]}"></div>`;
    }).join('');
    return `<div class="bar-group">${childBars}<span class="bar-date">${d.short}</span></div>`;
  }).join('');

  const legendHtml = S.children.map((c,i) => `
    <span><span class="legend-dot" style="background:${colors[i]||'#fff'}"></span>${esc(c.child_name)}</span>
  `).join('');

  const fromDate = new Date(S.today + 'T00:00:00');
fromDate.setDate(fromDate.getDate() - (days - 1));
const fromDateStr = fromDate.toISOString().substring(0,10);

// lấy đúng giao dịch trong window [fromDate .. S.today]
const recentTx = S.transactions
  .filter(tx => {
    const d = String(tx.date || tx.created_at || '').substring(0,10);
    return d >= fromDateStr && d <= S.today;
  })
  .slice(0, 200); // vẫn giới hạn để tránh render quá nặng
    
const sortedTx = [...recentTx].sort((a,b) => {
  const da = String(a.created_at || a.date || '');
  const db = String(b.created_at || b.date || '');
  return db.localeCompare(da);
});
  const txHtml = sortedTx.length ? sortedTx.map(tx => {
    const pts = Number(tx.points || 0);

    showLoad(true);
    try {
      const r = await api('resetWeek');
      if (r.success) { toast(r.message,'success'); await fetchData(true); }
      else             toast(r.message,'error');
    } catch(e) { toast('Lỗi kết nối','error'); }
    showLoad(false);
  });
}

runUiSelfCheck();
init();
</script>
