<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Bảng Điểm Thưởng – Kimetsu no Yaiba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b;
    color: #fff;
    padding: 13px 24px;
    border-radius: var(--r-full);
    font-size: 15px; font-weight: 700;
    opacity: 0;
    transition: all .35s cubic-bezier(.34,1.56,.64,1);
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
}
.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.toast.warn  { background: #f59e0b; color: #fff; }
.toast.error { background: #ef4444; color: #fff; }
.toast.ok    { background: var(--g600); color: #fff; }
        /* ========================================
           1. CSS VARIABLES
        ======================================== */
        :root {
            --g50:  #f0fdf4; --g100: #dcfce7; --g200: #bbf7d0;
            --g300: #86efac; --g400: #4ade80; --g500: #22c55e;
            --g600: #16a34a; --g700: #15803d;
            --p50:  #fdf2f8; --p100: #fce7f3; --p200: #fbcfe8;
            --p300: #f9a8d4; --p400: #f472b6; --p500: #ec4899;
            --p600: #db2777; --p700: #be185d;
            --ink:  #1a1a2e;
            --shadow-sm:    0 2px 8px  rgba(0,0,0,.08);
            --shadow-md:    0 4px 20px rgba(0,0,0,.12);
            --shadow-lg:    0 8px 40px rgba(0,0,0,.16);
            --shadow-green: 0 4px 20px rgba(34,197,94,.35);
            --shadow-pink:  0 4px 20px rgba(236,72,153,.35);
            --r-sm: 14px; --r-md: 20px; --r-lg: 28px;
            --r-xl: 36px; --r-full: 9999px;
        }

        /* ========================================
           2. RESET & BASE
        ======================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Baloo 2', cursive;
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
            background: var(--g50);
        }

        /* ========================================
           3. KEYFRAMES
        ======================================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0%   { transform: scale(.75); opacity: 0; }
            55%  { transform: scale(1.06); }
            80%  { transform: scale(.97); }
            100% { transform: scale(1);   opacity: 1; }
        }
        @keyframes wiggle {
            0%,100% { transform: rotate(-5deg); }
            50%     { transform: rotate(5deg);  }
        }
        @keyframes wiggleEl {
            0%,100% { transform: rotate(-3deg) scale(1); }
            50%     { transform: rotate(3deg)  scale(1.05); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-13px); }
        }
        @keyframes floatMirror {
            0%,100% { transform: translateY(0)    scaleX(-1); }
            50%     { transform: translateY(-11px) scaleX(-1); }
        }
        @keyframes slideInLeft {
            from { transform: translateX(-90px); opacity: 0; }
            to   { transform: translateX(0);     opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(90px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes petalFall {
            0%   { transform: translateY(-5vh) rotate(0deg)   translateX(0);    opacity: .95; }
            25%  { transform: translateY(25vh) rotate(90deg)  translateX(28px); }
            50%  { transform: translateY(52vh) rotate(180deg) translateX(-20px);}
            75%  { transform: translateY(78vh) rotate(270deg) translateX(22px); }
            100% { transform: translateY(108vh) rotate(360deg) translateX(0);   opacity: 0; }
        }
        @keyframes dotBounce {
            0%,80%,100% { transform: translateY(0); }
            40%         { transform: translateY(-11px); }
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50%     { transform: scale(1.07); }
        }
        @keyframes spin180 {
            from { transform: rotate(0deg); }
            to   { transform: rotate(180deg); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }

        /* ========================================
           4. LOADING OVERLAY
        ======================================== */
        #loadingOverlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,
        var(--g400)  0%,  var(--g500)  42%,
        var(--p300) 58%, var(--p500) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.4s ease;
}

#loadingOverlay.hidden {
    opacity: 0;
    pointer-events: none;
    display: none !important;
}
        #loadingOverlay .ld-icon {
            font-size: 68px;
            animation: wiggle .65s ease-in-out infinite;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
        }
        #loadingOverlay .ld-text {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            text-shadow: 1px 2px 6px rgba(0,0,0,.25);
            letter-spacing: .5px;
        }
        #loadingOverlay .ld-dots {
            display: flex;
            gap: 10px;
        }
        #loadingOverlay .ld-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,.9);
            animation: dotBounce 1.1s ease-in-out infinite;
        }
        #loadingOverlay .ld-dot:nth-child(2) { animation-delay: .2s; }
        #loadingOverlay .ld-dot:nth-child(3) { animation-delay: .4s; }

        /* ========================================
           5. CONFIRM MODAL
        ======================================== */
        #confirmModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        /* JS thường gọi style.display hoặc classList – hỗ trợ cả hai */
        #confirmModal.show,
        #confirmModal.active { display: flex; }

        .confirm-card {
            background: #fff;
            border-radius: var(--r-xl);
            padding: 38px 32px;
            max-width: 360px;
            width: 92%;
            text-align: center;
            animation: bounceIn .45s cubic-bezier(.34,1.56,.64,1);
            box-shadow:
                0 24px 64px rgba(0,0,0,.28),
                0 0 0 3px var(--g300),
                0 0 0 7px rgba(74,222,128,.18);
        }
        .confirm-card .conf-emoji {
            display: block;
            font-size: 54px;
            margin-bottom: 10px;
            animation: wiggleEl 1.3s ease-in-out infinite;
        }
        .confirm-card p {
            font-size: 18px;
            font-weight: 700;
            color: #334155;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .conf-actions {
            display: flex;
            gap: 14px;
        }
        #cancelBtn {
            flex: 1;
            padding: 14px 8px;
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #b91c1c;
            border: 2.5px solid #fca5a5;
            border-radius: var(--r-full);
            font-family: 'Baloo 2', cursive;
            font-size: 17px; font-weight: 800;
            cursor: pointer;
            transition: all .25s ease;
        }
        #cancelBtn:hover {
            transform: scale(1.07) translateY(-2px);
            box-shadow: 0 6px 20px rgba(185,28,28,.28);
        }
        #confirmBtn {
            flex: 1;
            padding: 14px 8px;
            background: linear-gradient(135deg, var(--g400), var(--g600));
            color: #fff;
            border: none;
            border-radius: var(--r-full);
            font-family: 'Baloo 2', cursive;
            font-size: 17px; font-weight: 800;
            cursor: pointer;
            transition: all .25s ease;
            box-shadow: var(--shadow-green);
        }
        #confirmBtn:hover {
            transform: scale(1.07) translateY(-2px);
            box-shadow: 0 8px 24px rgba(34,197,94,.48);
        }

        /* ========================================
           6. LOGIN SCREEN
        ======================================== */
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* — Background split: green left / pink right — */
        #loginScreen::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to right,
                #84cc16  0%,  var(--g400) 38%,
                var(--p300) 62%, var(--p500) 100%);
            z-index: 0;
        }
        /* Tanjiro checkered overlay – left half */
        #loginScreen::after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 50%; height: 100%;
            background-image:
                repeating-linear-gradient(45deg,
                    rgba(0,0,0,.09) 0, rgba(0,0,0,.09) 3px,
                    transparent 3px, transparent 16px),
                repeating-linear-gradient(-45deg,
                    rgba(0,0,0,.09) 0, rgba(0,0,0,.09) 3px,
                    transparent 3px, transparent 16px);
            z-index: 1;
        }
        /* Nezuko hemp-leaf dot overlay – right half */
        .nezuko-bg {
            position: absolute;
            right: 0; top: 0;
            width: 50%; height: 100%;
            background-image:
                radial-gradient(circle, rgba(255,255,255,.28) 2px, transparent 2px);
            background-size: 22px 22px;
            z-index: 1;
            pointer-events: none;
        }

        /* — Character wrappers — */
        .char-tanjiro-wrap,
        .char-nezuko-wrap {
            position: absolute;
            bottom: 0;
            z-index: 2;
        }
        .char-tanjiro-wrap {
            left: 0;
            animation: slideInLeft .9s cubic-bezier(.34,1.56,.64,1) both;
        }
        .char-nezuko-wrap {
            right: 0;
            animation: slideInRight .9s cubic-bezier(.34,1.56,.64,1) both;
        }
        .char-tanjiro-wrap svg {
            width: 168px; height: auto;
            display: block;
            animation: float 3.2s ease-in-out infinite;
            filter: drop-shadow(0 10px 18px rgba(0,80,0,.28));
        }
        .char-nezuko-wrap svg {
            width: 150px; height: auto;
            display: block;
            animation: float 3.2s ease-in-out 1.1s infinite;
            filter: drop-shadow(0 10px 18px rgba(190,24,93,.28));
        }

        /* — Login card — */
        .login-card {
            position: relative;
            z-index: 3;
            background: rgba(255,255,255,.97);
            border-radius: var(--r-xl);
            padding: 44px 40px;
            width: 92%;
            max-width: 420px;
            box-shadow:
                0 32px 80px rgba(0,0,0,.22),
                0 0 0 3px rgba(74,222,128,.55),
                0 0 0 7px rgba(255,255,255,.5);
            border: 2px solid rgba(74,222,128,.28);
            animation: bounceIn .75s cubic-bezier(.34,1.56,.64,1) both;
        }
        .login-badge {
            display: block;
            text-align: center;
            font-size: 40px;
            margin-bottom: 6px;
            animation: wiggleEl 2.2s ease-in-out infinite;
        }
        .login-card h1 {
            text-align: center;
            font-size: 30px; font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--g700), var(--p700));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-sub {
            text-align: center;
            font-size: 15px; font-weight: 600;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        /* Error message */
        #loginError {
            background: linear-gradient(135deg, #fff1f2, #fee2e2);
            border: 2.5px solid #fca5a5;
            border-radius: var(--r-md);
            padding: 13px 18px;
            text-align: center;
            font-size: 15px; font-weight: 700;
            color: #dc2626;
            margin-bottom: 18px;
            display: none;
            animation: wiggle .5s ease;
        }

        /* Inputs */
        .login-card .inp-wrap { margin-bottom: 16px; }
        .login-card .pwd-wrap { position: relative; margin-bottom: 16px; }

        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 17px 22px;
            font-family: 'Baloo 2', cursive;
            font-size: 16px; font-weight: 600;
            color: #334155;
            background: #f8fafc;
            border: 2.5px solid #e2e8f0;
            border-radius: var(--r-full);
            outline: none;
            transition: all .3s ease;
        }
        .login-card input:focus {
            border-color: var(--g400);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(74,222,128,.2), var(--shadow-green);
        }
        .login-card .pwd-wrap input { padding-right: 58px; }

        #togglePassword {
            position: absolute;
            right: 18px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer;
            font-size: 22px; line-height: 1;
            padding: 4px;
            transition: transform .2s ease;
        }
        #togglePassword:hover { transform: translateY(-50%) scale(1.35); }

        /* Login button */
        #loginBtn {
            width: 100%;
            padding: 19px;
            background: linear-gradient(135deg, var(--g400), var(--g600));
            color: #fff;
            border: none;
            border-radius: var(--r-full);
            font-family: 'Baloo 2', cursive;
            font-size: 20px; font-weight: 800;
            letter-spacing: .5px;
            cursor: pointer;
            margin-top: 6px;
            transition: all .3s cubic-bezier(.34,1.56,.64,1);
            box-shadow: var(--shadow-green), 0 5px 0 var(--g700);
        }
        #loginBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 32px rgba(34,197,94,.5), 0 7px 0 var(--g700);
        }
        #loginBtn:active {
            transform: translateY(2px) scale(.98);
            box-shadow: var(--shadow-sm), 0 2px 0 var(--g700);
        }

        /* ========================================
           7. MAIN APP
        ======================================== */
        #mainApp {
            display: none;        /* ← thêm: ẩn mặc định */
    min-height: 100vh;
    background: linear-gradient(160deg,
        var(--g50)  0%, #f0fdf4 32%,
        var(--p50) 68%, #fdf2f8 100%);
}

/* ← thêm block mới này */
#mainApp.visible {
    display: block;
}

        /* — Header — */
        #appHeader {
            position: sticky; top: 0; z-index: 200;
            background: linear-gradient(135deg, var(--g700), var(--g500), var(--g400));
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 22px rgba(22,163,74,.45);
        }
        .hd-left {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .hd-title {
            font-size: 21px; font-weight: 800;
            color: #fff;
            text-shadow: 1px 2px 5px rgba(0,0,0,.2);
        }
        #currentUser {
            font-size: 13px; font-weight: 700;
            color: rgba(255,255,255,.88);
            background: rgba(255,255,255,.2);
            padding: 4px 13px;
            border-radius: var(--r-full);
            border: 1.5px solid rgba(255,255,255,.3);
        }
        .hd-actions { display: flex; gap: 8px; }
        #refreshBtn, #logoutBtn {
            background: rgba(255,255,255,.2);
            border: 2px solid rgba(255,255,255,.35);
            border-radius: var(--r-full);
            padding: 9px 14px;
            font-size: 18px; color: #fff;
            cursor: pointer;
            font-family: 'Baloo 2', cursive; font-weight: 700;
            transition: all .3s ease;
        }
        #refreshBtn:hover {
            background: rgba(255,255,255,.35);
            transform: rotate(180deg) scale(1.12);
        }
        #logoutBtn:hover {
            background: rgba(255,80,80,.3);
            border-color: rgba(255,160,160,.5);
            transform: scale(1.12);
        }

        /* — Navigation — */
        #mainNav {
            position: sticky; top: 56px; z-index: 199;
            background: #fff;
            padding: 10px 14px;
            display: flex; gap: 8px;
            overflow-x: auto;
            box-shadow: 0 3px 18px rgba(0,0,0,.1);
            scrollbar-width: none;
        }
        #mainNav::-webkit-scrollbar { display: none; }

        .nav-btn {
            flex-shrink: 0;
            padding: 11px 18px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: var(--r-full);
            font-family: 'Baloo 2', cursive;
            font-size: 14px; font-weight: 700;
            color: #64748b;
            cursor: pointer;
            white-space: nowrap;
            transition: all .25s cubic-bezier(.34,1.56,.64,1);
        }
        .nav-btn:hover {
            background: var(--g100);
            color: var(--g700);
            border-color: var(--g300);
            transform: translateY(-2px);
        }
        .nav-btn.active {
            background: linear-gradient(135deg, var(--g400), var(--g600));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(34,197,94,.45);
            transform: translateY(-3px);
        }

        /* — Tab content — */
        #tabContent {
            padding: 20px 16px 48px;
            max-width: 820px;
            margin: 0 auto;
        }
        .tab-panel {
            display: none;
            animation: fadeInUp .4s ease;
        }
        .tab-panel.active { display: block; }

        /* — Generic white card — */
        .kmt-card {
            background: #fff;
            border-radius: var(--r-lg);
            padding: 24px 22px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-md);
            border: 2px solid rgba(74,222,128,.14);
        }
        .kmt-card-title {
            font-size: 20px; font-weight: 800;
            color: var(--ink);
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ========================================
           8. CHERRY BLOSSOM PETALS (Rewards tab)
        ======================================== */
        .petals-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9990;
            overflow: hidden;
            display: none;
        }
        .petals-container.petals-active { display: block; }

        .petal {
            position: absolute;
            top: -6%;
            animation: petalFall linear infinite;
            opacity: .9;
        }
        .petal:nth-child(1)  { left:4%;  font-size:18px; animation-duration:5.2s; animation-delay:0s;    }
        .petal:nth-child(2)  { left:11%; font-size:22px; animation-duration:6.1s; animation-delay:.6s;   }
        .petal:nth-child(3)  { left:19%; font-size:16px; animation-duration:4.6s; animation-delay:1.1s;  }
        .petal:nth-child(4)  { left:27%; font-size:20px; animation-duration:7.0s; animation-delay:.3s;   }
        .petal:nth-child(5)  { left:36%; font-size:24px; animation-duration:5.7s; animation-delay:1.6s;  }
        .petal:nth-child(6)  { left:45%; font-size:18px; animation-duration:6.4s; animation-delay:.9s;   }
        .petal:nth-child(7)  { left:53%; font-size:20px; animation-duration:5.0s; animation-delay:2.0s;  }
        .petal:nth-child(8)  { left:62%; font-size:16px; animation-duration:7.3s; animation-delay:.4s;   }
        .petal:nth-child(9)  { left:70%; font-size:22px; animation-duration:4.2s; animation-delay:1.3s;  }
        .petal:nth-child(10) { left:78%; font-size:18px; animation-duration:6.0s; animation-delay:.7s;   }
        .petal:nth-child(11) { left:86%; font-size:24px; animation-duration:5.5s; animation-delay:1.9s;  }
        .petal:nth-child(12) { left:93%; font-size:20px; animation-duration:4.8s; animation-delay:.5s;   }

        /* ========================================
           9. RESPONSIVE
        ======================================== */
        @media (max-width: 480px) {
            .login-card { padding: 32px 22px; }
            .login-card h1 { font-size: 24px; }
            .login-badge { font-size: 32px; }
            #loginBtn { font-size: 18px; padding: 16px; }
            .char-tanjiro-wrap svg { width: 110px; }
            .char-nezuko-wrap svg  { width: 98px;  }
            .hd-title { font-size: 18px; }
            .nav-btn  { font-size: 13px; padding: 9px 13px; }
            #appHeader { padding: 12px 14px; }
        }
        @media (max-width: 360px) {
            /* Rất nhỏ: ẩn nhân vật để không che form */
            .char-tanjiro-wrap,
            .char-nezuko-wrap { display: none; }
        }
.char-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    cursor: default;
}
.char-icon { font-size: 28px; }
.char-name { font-weight: 700; color: #fff; font-size: 14px; }
.char-role { font-size: 11px; color: rgba(255,255,255,0.8); }

/* Wrapper */
#chars-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
}
    </style>
</head>

<body>

<!-- ============================================================
     LOADING OVERLAY
     id="loadingOverlay" – JS ẩn/hiện element này
============================================================ -->
<div id="loadingOverlay">
    <div class="ld-icon">⚔️</div>
    <div class="ld-text">Đang tải...</div>
    <div class="ld-dots">
        <div class="ld-dot"></div>
        <div class="ld-dot"></div>
        <div class="ld-dot"></div>
    </div>
</div>


<!-- ============================================================
     CONFIRM MODAL
     id="confirmModal" | id="cancelBtn" | id="confirmBtn"
============================================================ -->
<div id="confirmModal">
    <div class="confirm-card">
        <span class="conf-emoji">⚔️</span>
        <p>Bạn chắc chắn muốn thực hiện thao tác này?</p>

<!-- ============================================================
     SCRIPT TRANG TRÍ: Bật/tắt cánh hoa khi tab Thưởng active
     (Purely visual – không chạm logic gốc)
============================================================ -->
<script>
(function () {
    var petals = document.getElementById('petalsContainer');
    if (!petals) return;

    function syncPetals() {
        var rewards = document.getElementById('tab-rewards');
        if (!rewards) return;
        if (rewards.classList.contains('active') ||
            rewards.style.display === 'block') {
            petals.classList.add('petals-active');
        } else {
            petals.classList.remove('petals-active');
        }
    }

    // Observe class & style changes on tabContent
    var tc = document.getElementById('tabContent');
    if (tc && window.MutationObserver) {
        var obs = new MutationObserver(syncPetals);
        obs.observe(tc, {
            subtree: true, attributes: true,
            attributeFilter: ['class', 'style']
        });
    }
    syncPetals();
})();
</script>


<!-- ============================================================
     ⚠️  SCRIPT GỐC CỦA ỨNG DỤNG  ⚠️
         (Giữ nguyên – không chỉnh sửa)
============================================================ -->
<script>
// ============================================================
// CONFIG — ĐỔI URL NÀY
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxJwpMxT1gMADbf8CGcCZDkRsX68uwHh4_1lquJ8ryg3icDns4LEVByTVFyMtJEXsqo/exec';

// ============================================================
// STATE
// ============================================================
let S = {
  token:       localStorage.getItem('fq_token') || null,
  user:        JSON.parse(localStorage.getItem('fq_user') || 'null'),
  children:    [],
  tasks:       [],
  rewards:     [],
  transactions:[],
  dailyStatus: [],
  redemptions: [],
  today:       '',
  week_start:  '',
  activeTab:   'today',
  taskFilter:  'all'
};

// ============================================================
//  HELPER
// ============================================================
async function api(action, data = {}) {
    console.log('API_URL =', API_URL);  // ← thêm dòng này

    const body = {
        action,
        token:   S.token || null,
        payload: data
    };

    console.log(`api → [${action}]`, body);

    try {
        const res = await fetch(API_URL, {
            method:   'POST',
            redirect: 'follow',
            headers:  { 'Content-Type': 'text/plain;charset=utf-8' },
            body:     JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const json = await res.json();
        console.log(`api ← [${action}]`, json);
        return json;

    } catch(err) {
        console.error('fetch error:', err); // ← xem lỗi thật sự
        throw err;
    }
}

// ============================================================
// FETCH ALL DATA
// ============================================================
async function fetchData(silent = false) {
    if (!silent) showLoad(true);
    try {
        const r = await api('getInitialData');
        if (r.success) {
            S.children     = (r.children     || []).filter(c => c.status === 'active' || !c.status);
            S.tasks        = (r.tasks        || []).filter(t => t.status === 'active');
            S.rewards      = (r.rewards      || []).filter(rw => rw.status === 'active');
            S.transactions = r.transactions  || [];
            S.dailyStatus  = r.dailyStatus   || [];
            S.redemptions  = r.redemptions   || [];
            S.today        = r.today         || '';
            S.week_start   = r.week_start    || '';
            renderTab(S.activeTab);
        } else {
            if (!silent) toast(r.message || 'Không tải được dữ liệu', 'error');
        }
    } catch(e) {
        console.error('fetchData crash:', e); // ✅ thêm dòng này
        if (!silent) toast('⚠️ Không kết nối được server', 'error');
    }
    if (!silent) showLoad(false);
}

async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  await fetchData(true);
  btn.classList.remove('spinning');
  toast('Đã làm mới dữ liệu ✅', 'success');
}

// ============================================================
// SCORE HELPERS (dùng giá trị pre-computed từ server)
// ============================================================
function childScore(childId) {
  const c = S.children.find(x => String(x.child_id) === String(childId));
  if (!c) return { today_score:0, week_score:0, total_score:0, earned_score:0, daily_target:50 };
  return {
    today_score:  Number(c.today_score  || 0),
    week_score:   Number(c.week_score   || 0),
    total_score:  Number(c.total_score  || 0),
    earned_score: Number(c.earned_score || 0),
    daily_target: Number(c.daily_target || 50)
  };
}

// ============================================================
// TASK HELPERS
// ============================================================
function isTaskDone(childId, taskId) {
  return S.dailyStatus.some(ds =>
    String(ds.child_id) === String(childId) &&
    String(ds.task_id)  === String(taskId)  &&
    (ds.status === 'done' || ds.status === 'completed')
  );
}

function taskAppliesTo(task, child) {
  const at = String(task.assigned_to || 'both').toLowerCase();
  if (at === 'both') return true;
  return at === String(child.child_id).toLowerCase() ||
         at === String(child.child_key || '').toLowerCase();
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errEl    = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!username || !password) { toast('Nhập username và password', 'warn'); return; }

    showLoad(true);

    let loginResult = null; // ← tách ra ngoài

    try {
        loginResult = await api('login', { username, password });
    } catch(err) {
        toast('⚠️ Không kết nối được server.', 'error');
        showLoad(false);
        return; // ← dừng hẳn
    }

    // ✅ Từ đây không còn nhầm lỗi network vs lỗi UI
    if (loginResult?.success) {
        S.token = loginResult.token;
        S.user  = {
            user_id:      loginResult.user_id,
            username:     loginResult.username,
            display_name: loginResult.display_name,
            role:         loginResult.role,
            child_id:     loginResult.child_id || null
        };
        localStorage.setItem('fq_token', loginResult.token);
        localStorage.setItem('fq_user',  JSON.stringify(S.user));
        showLoad(false);
        showApp();           // ← lỗi ở đây sẽ hiện đúng trên console
        await fetchData(true);
    } else {
        errEl.style.display = 'block';
        showLoad(false);
    }
}

function handleLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('fq_token');
  localStorage.removeItem('fq_user');
  showLogin();
}

function togglePw() {
  const inp = document.getElementById('inp-pass');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}

// ============================================================
// SESSION RESTORE
// ============================================================
async function init() {
    buildLoginChars();

    // ✅ Parse đúng từ localStorage
    const savedToken = localStorage.getItem('fq_token');
    const savedUser  = JSON.parse(localStorage.getItem('fq_user') || 'null');

    if (savedToken && savedUser) {
        S.token = savedToken;
        S.user  = savedUser;

        try {
            const r = await api('validateSession');
            if (r?.success) {
                S.user = {
                    user_id:      r.user_id,
                    username:     r.username,
                    display_name: r.display_name,
                    role:         r.role,
                    child_id:     r.child_id
                };
                localStorage.setItem('fq_user', JSON.stringify(S.user));
                showLoad(false);
                showApp();
                await fetchData(true);
                return;
            }
        } catch(e) {
            console.warn('validateSession failed:', e);
        }

        // Token hết hạn → xóa
        S.token = null;
        S.user  = null;
        localStorage.removeItem('fq_token');
        localStorage.removeItem('fq_user');
    }

    showLoad(false);
    showLogin();
}

function buildLoginChars() {
  // Static decorative buttons for login screen
  const row = document.getElementById('chars-row');
  const chars = [
    { icon: '⚔️', name: 'Bố / Mẹ',     role: 'admin / scorer' },
    { icon: '🌸', name: 'Các bé',        role: 'viewer' }
  ];
  row.innerHTML = chars.map(c => `
    <div class="char-btn">
      <span class="char-icon">${c.icon}</span>
      <span class="char-name">${c.name}</span>
      <span class="char-role">${c.role}</span>
    </div>
  `).join('');
}

// ============================================================
// UI HELPERS
// ============================================================
function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.remove('visible');
}

function showApp() {
    // Debug: xem cái nào null
    console.log({
        loginScreen : document.getElementById('loginScreen'),
        mainApp     : document.getElementById('mainApp'),
        currentUser : document.getElementById('currentUser'),
        settingsBtn : document.getElementById('tab-btn-settings'),
    });

    const loginScreen = document.getElementById('loginScreen');
    const mainApp     = document.getElementById('mainApp');
    const currentUser = document.getElementById('currentUser');
    const settingsBtn = document.getElementById('tab-btn-settings');

    if (loginScreen) loginScreen.style.display = 'none';
    if (mainApp)     mainApp.classList.add('visible');
    if (currentUser) currentUser.textContent =
        (S.user?.display_name || '?') + ' · ' + (S.user?.role || '');

    // ✅ Không crash nếu tab chưa tồn tại
    if (settingsBtn) {
        settingsBtn.style.display =
            (S.user?.role === 'admin' || S.user?.role === 'scorer') ? '' : 'none';
    }

    switchTab('today');
}

function showLoad(v) {
    const overlay = document.getElementById('loadingOverlay');
    if (v) {
        overlay.style.display = 'flex';
        overlay.classList.remove('hidden');
    } else {
        overlay.classList.add('hidden');
    }
}

let toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

function switchTab(tab) {
    console.log('switchTab →', tab);
    S.activeTab = tab;

    document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === tab)
    );
    document.querySelectorAll('.tab-content').forEach(t =>
        t.style.display = (t.id === 'tab-' + tab) ? 'block' : 'none' // ✅ 'block'
    );

    renderTab(tab);
}

function renderTab(tab) {
  switch (tab) {
    case 'today':    renderToday();    break;
    case 'tasks':    renderTasks();    break;
    case 'points':   renderPoints();   break;
    case 'rewards':  renderRewards();  break;
    case 'rankings': renderRankings(); break;
    case 'history':  renderHistory();  break;
    case 'settings': renderSettings(); break;
  }
}

// confirm modal
let modalCb = null;
function confirm(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  modalCb = cb;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-ok').onclick = () => { closeModal(); if (modalCb) modalCb(); };
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function fmtDate(d) {
  if (!d) return '';
  const s = String(d).substring(0, 10);
  const parts = s.split('-');
  return `${parts[2]}/${parts[1]}`;
}

function fmtDatetime(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d).substring(0,16);
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

// RENDER: TASKS
// ============================================================
function renderTasks() {
  const el = document.getElementById('tab-tasks');
  const canInteract = S.user?.role === 'admin' || S.user?.role === 'scorer';

  const cats = [
    { key: 'all',           label: '🔍 Tất cả' },
    { key: 'Tác phong hằng ngày', label: '🌅 Tác phong' },
    { key: 'Việc nhà',      label: '🏠 Việc nhà' },
    { key: 'Học tập',       label: '📚 Học tập' },
    { key: 'Điểm phát sinh',label: '⚡ Phát sinh' },
    { key: 'Thành tích',    label: '🏆 Thành tích' }
  ];

  const activeTasks = S.tasks.filter(t => {
    if (S.taskFilter === 'all') return true;
    return t.category === S.taskFilter;
  });

  // Group by category
  const groups = {};
  activeTasks.forEach(t => {
    const cat = t.category || 'Khác';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  let html = `
    <div class="sec-title">✅ Nhiệm Vụ Hôm Nay</div>
    <div class="cat-filter">
      ${cats.map(c => `
        <div class="cat-pill ${S.taskFilter === c.key ? 'active' : ''}"
             onclick="setTaskFilter('${c.key}')">${c.label}</div>
      `).join('')}
    </div>
  `;

  if (!activeTasks.length) {
    html += '<div class="empty-state"><div class="es-icon">✅</div><p>Không có nhiệm vụ nào</p></div>';
    el.innerHTML = html;
    return;
  }

  Object.entries(groups).forEach(([cat, tasks]) => {
    html += `<div class="cat-section"><div class="cat-section-title">${cat}</div>`;
    tasks.forEach(task => {
      const applicable = S.children.filter(c => taskAppliesTo(task, c));
      if (!applicable.length) return;

      html += `
        <div class="task-item">
          <div class="task-item-head">
            <span class="task-name-text">${task.task_name}</span>
            <span class="task-pts-badge">+${task.points} ⭐</span>
          </div>
          <div class="task-checks">
      `;
      applicable.forEach(child => {
        const done = isTaskDone(child.child_id, task.task_id);
        const ro   = !canInteract ? 'readonly' : '';
        html += `
          <label class="check-label ${done ? 'done' : ''} ${ro}"
                 id="lbl-${child.child_id}-${task.task_id}"
                 onclick="${canInteract ? `handleTaskToggle('${child.child_id}','${task.task_id}',${done})` : ''}">
            <div class="check-box">${done ? '✓' : ''}</div>
            <span class="check-child-name">${child.avatar_icon || ''} ${child.child_name}</span>
          </label>
        `;
      });
      html += `</div></div>`;
    });
    html += '</div>';
  });

  el.innerHTML = html;
}

function setTaskFilter(key) {
  S.taskFilter = key;
  renderTasks();
}

// ============================================================
// TASK TOGGLE (complete / undo)
// ============================================================
async function handleTaskToggle(childId, taskId, isDone) {
  if (S.user?.role !== 'admin' && S.user?.role !== 'scorer') return;

  const child = S.children.find(c => String(c.child_id) === String(childId));
  const task  = S.tasks.find(t => String(t.task_id) === String(taskId));
  if (!child || !task) return;

  const lbl = document.getElementById(`lbl-${childId}-${taskId}`);
  if (lbl) { lbl.style.opacity = '0.5'; lbl.style.pointerEvents = 'none'; }

  showLoad(true);
  try {
    if (!isDone) {
      // Complete task
      const r = await api('completeTask', { child_id: childId, task_id: taskId });
      if (r.success) {
        toast(`✅ ${child.child_name}: +${task.points} ⭐`, 'success');
        await fetchData(true);
      } else {
        toast(r.message, 'error');
        if (lbl) { lbl.style.opacity = ''; lbl.style.pointerEvents = ''; }
      }
    } else {
      // Undo task
      const r = await api('undoTask', { child_id: childId, task_id: taskId });
      if (r.success) {
        toast(`↩️ ${child.child_name}: -${task.points} ⭐`, 'warn');
        await fetchData(true);
      } else {
        toast(r.message, 'error');
        if (lbl) { lbl.style.opacity = ''; lbl.style.pointerEvents = ''; }
      }
    }
  } catch(e) {
    toast('Lỗi kết nối', 'error');
    if (lbl) { lbl.style.opacity = ''; lbl.style.pointerEvents = ''; }
  }
  showLoad(false);
}

// RENDER: HISTORY
// ============================================================
function renderHistory() {
  const el = document.getElementById('tab-history');
  if (!S.children.length || !S.today) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">📊</div><p>Đang tải...</p></div>';
    return;
  }

  // Build 7-day data from transactions
  const days = 7;
  const dayData = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(S.today + 'T00:00:00');
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().substring(0, 10);
    const entry = { date: ds, short: `${d.getDate()}/${d.getMonth()+1}`, scores: {} };
    S.children.forEach(c => {
      entry.scores[c.child_id] = S.transactions
        .filter(tx => String(tx.child_id) === String(c.child_id) && String(tx.date).substring(0,10) === ds)
        .reduce((sum, tx) => sum + Number(tx.points || 0), 0);
    });
    dayData.push(entry);
  }

  const allVals = dayData.flatMap(d => Object.values(d.scores));
  const maxVal  = Math.max(...allVals, 1);

  const colors = ['var(--red)', 'var(--blue)', 'var(--green)'];

  let barsHtml = dayData.map(d => {
    const childBars = S.children.map((c, i) => {
      const h = Math.max(4, Math.round((d.scores[c.child_id] / maxVal) * 100));
      return `<div class="bar b${i+1}" style="height:${h}px" title="${c.child_name}: ${d.scores[c.child_id]}"></div>`;
    }).join('');
    return `<div class="bar-group">${childBars}<span class="bar-date">${d.short}</span></div>`;
  }).join('');

  const legendHtml = S.children.map((c, i) => `
    <span>
      <span class="legend-dot" style="background:${colors[i] || '#fff'}"></span>
      ${c.child_name}
    </span>
  `).join('');

  // Recent transactions
  const recentTx = S.transactions.slice(0, 30);
  const txHtml = recentTx.length ? recentTx.map(tx => {
    const pts = Number(tx.points || 0);
    return `
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-name">${tx.child_name || ''} · ${tx.note || tx.task_name || tx.type || ''}</div>
          <div class="tx-meta">${fmtDatetime(tx.created_at)} · ${tx.created_by_name || ''}</div>
        </div>
        <div class="tx-pts ${pts >= 0 ? 'pos' : 'neg'}">${pts >= 0 ? '+' : ''}${pts}</div>
      </div>
    `;
  }).join('') : '<div class="empty-state"><div class="es-icon">📜</div><p>Chưa có dữ liệu</p></div>';

  el.innerHTML = `
    <div class="sec-title">📊 Lịch Sử</div>

    <div class="chart-wrap">
      <div class="chart-title">📈 Biểu Đồ 7 Ngày Gần Đây</div>
      <div class="bar-chart">${barsHtml}</div>
      <div class="chart-legend">${legendHtml}</div>
    </div>

    <div class="sec-title">📜 Giao Dịch Gần Đây</div>
    ${txHtml}
  `;
}

  const cats = ['Tác phong hằng ngày','Việc nhà','Học tập','Điểm phát sinh','Thành tích'];
  const catOpts = cats.map(c => `<option value="${c}">${c}</option>`).join('');

  let assignOpts = `<option value="both">👥 Cả hai</option>` +
    S.children.map(c => `<option value="${c.child_key || c.child_id}">${c.avatar_icon || ''} ${c.child_name}</option>`).join('');

  let adminSection = '';
  if (role === 'admin') {
    adminSection = `
      <div class="settings-card">
        <h3>⚙️ Quản Lý Hệ Thống</h3>
        <button class="btn-setting" onclick="doResetToday()">🔄 Đặt Lại Nhiệm Vụ Hôm Nay</button>
        <button class="btn-setting danger" onclick="doResetWeek()">🗑️ Đặt Lại Điểm Tuần</button>
      </div>
    `;
  }

  el.innerHTML = `
    <div class="sec-title">⚙️ Cài Đặt</div>

    <div class="settings-card">
      <h3>➕ Thêm Nhiệm Vụ Mới</h3>
      <div class="add-task-form">
        <div class="form-row">
          <label>Tên nhiệm vụ</label>
          <input id="nt-name" class="form-input" type="text" placeholder="Tên nhiệm vụ..." />
        </div>
        <div class="form-row-2">
          <div>
            <label>Danh mục</label>
            <select id="nt-cat" class="form-select">${catOpts}</select>
          </div>
          <div>
            <label>Số điểm</label>
            <input id="nt-pts" class="form-input" type="number" min="1" placeholder="10" />
          </div>
        </div>
        <div class="form-row">
          <label>Giao cho</label>
          <select id="nt-assign" class="form-select">${assignOpts}</select>
        </div>
        <button class="btn-submit" onclick="submitAddTask()">✅ Thêm Nhiệm Vụ</button>
      </div>
    </div>

    <div class="settings-card">
      <h3>🎁 Thêm Phần Thưởng Mới</h3>
      <div class="add-reward-form">
        <div class="form-row">
          <label>Tên phần thưởng</label>
          <input id="nr-name" class="form-input" type="text" placeholder="Tên phần thưởng..." />
        </div>
        <div class="form-row-2">
          <div>
            <label>Icon</label>
            <input id="nr-icon" class="form-input" type="text" placeholder="🎁" />
          </div>
          <div>
            <label>Điểm cần</label>
            <input id="nr-pts" class="form-input" type="number" min="1" placeholder="200" />
          </div>
        </div>
        <button class="btn-submit" onclick="submitAddReward()">🎁 Thêm Phần Thưởng</button>
      </div>
    </div>

    ${adminSection}
  `;
}

async function submitAddTask() {
  const name   = document.getElementById('nt-name').value.trim();
  const cat    = document.getElementById('nt-cat').value;
  const pts    = Number(document.getElementById('nt-pts').value);
  const assign = document.getElementById('nt-assign').value;

  if (!name) { toast('Nhập tên nhiệm vụ', 'warn'); return; }
  if (!pts || pts <= 0) { toast('Nhập số điểm hợp lệ', 'warn'); return; }

  showLoad(true);
  try {
    const r = await api('addTask', { task_name: name, category: cat, points: pts, assigned_to: assign });
    if (r.success) {
      toast(r.message, 'success');
      document.getElementById('nt-name').value = '';
      document.getElementById('nt-pts').value  = '';
      await fetchData(true);
    } else { toast(r.message, 'error'); }
  } catch(e) { toast('Lỗi kết nối', 'error'); }
  showLoad(false);
}

async function submitAddReward() {
  const name = document.getElementById('nr-name').value.trim();
  const icon = document.getElementById('nr-icon').value.trim() || '🎁';
  const pts  = Number(document.getElementById('nr-pts').value);

  if (!name) { toast('Nhập tên phần thưởng', 'warn'); return; }
  if (!pts || pts <= 0) { toast('Nhập số điểm hợp lệ', 'warn'); return; }

  showLoad(true);
  try {
    const r = await api('addReward', { reward_name: name, icon, required_points: pts });
    if (r.success) {
      toast(r.message, 'success');
      document.getElementById('nr-name').value = '';
      document.getElementById('nr-icon').value = '';
      document.getElementById('nr-pts').value  = '';
      await fetchData(true);
    } else { toast(r.message, 'error'); }
  } catch(e) { toast('Lỗi kết nối', 'error'); }
  showLoad(false);
}

async function doResetToday() {
  confirm('🔄 Đặt lại nhiệm vụ?', 'Xóa toàn bộ tick hôm nay (điểm không đổi). Chắc chắn?', async () => {
    showLoad(true);
    try {
      const r = await api('resetToday');
      if (r.success) { toast(r.message, 'success'); await fetchData(true); }
      else            toast(r.message, 'error');
    } catch(e) { toast('Lỗi kết nối', 'error'); }
    showLoad(false);
  });
}

async function doResetWeek() {
  confirm('🗑️ Đặt lại điểm tuần?', '⚠️ Sẽ xóa toàn bộ giao dịch tuần này. Không thể hoàn tác!', async () => {
    showLoad(true);
    try {
      const r = await api('resetWeek');
      if (r.success) { toast(r.message, 'success'); await fetchData(true); }
      else            toast(r.message, 'error');
    } catch(e) { toast('Lỗi kết nối', 'error'); }
    showLoad(false);
  });
}

init();
</script>
<div id="toast" class="toast"></div>
</body>
