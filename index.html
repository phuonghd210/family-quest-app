<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>⚔️ Bảng Điểm Diệt Quỷ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Nunito', 'Baloo 2', sans-serif;
      background: var(--bg-page);
      color: var(--text);
      font-size: 16px;
    }

    /* ============================================================
       CSS VARIABLES — Light Theme · Demon Slayer
    ============================================================ */
    :root {
      /* Backgrounds */
      --bg-page:    #f0fdf4;
      --bg-card:    #ffffff;
      --bg-surface: #f9fafb;
      --bg-nav:     #ffffff;

      /* Green — Tanjiro */
      --green:      #16a34a;
      --green-l:    #22c55e;
      --green-bg:   #dcfce7;

      /* Pink — Nezuko */
      --pink:       #ec4899;
      --pink-l:     #f472b6;
      --pink-bg:    #fce7f3;

      /* Accent */
      --gold:       #f59e0b;
      --gold-bg:    #fef3c7;
      --blue:       #3b82f6;
      --blue-bg:    #dbeafe;
      --red:        #ef4444;
      --red-l:      #f87171;

      /* Text */
      --text:       #1e293b;
      --dim:        #64748b;
      --text-light: #94a3b8;

      /* Border & Shadow */
      --border:     rgba(0,0,0,0.08);
      --shadow-sm:  0 2px 8px rgba(0,0,0,0.08);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.12);
      --shadow-lg:  0 8px 32px rgba(0,0,0,0.15);

      --radius: 20px;
    }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes floatUp { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

    /* ============================================================
       LOADING
    ============================================================ */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(240,253,244,0.92);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      backdrop-filter: blur(6px);
    }
    #loading span { color: var(--dim); font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--green-bg);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ============================================================
       TOAST
    ============================================================ */
    #toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 700; z-index: 8888;
      opacity: 0; transition: opacity 0.3s;
      max-width: 90vw; text-align: center;
      box-shadow: var(--shadow-md);
      pointer-events: none;
      font-family: 'Nunito', sans-serif;
    }
    #toast.show    { opacity: 1; }
    #toast.success { background: var(--green); color: #fff; }
    #toast.error   { background: var(--red);   color: #fff; }
    #toast.warn    { background: var(--gold);   color: #fff; }

    /* ============================================================
       MODAL
    ============================================================ */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 7777;
      background: rgba(0,0,0,0.40);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--bg-card); border-radius: 20px;
      padding: 28px 24px; max-width: 340px; width: 90%;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.22s ease;
    }
    .modal-box h3 {
      margin-bottom: 10px; font-size: 18px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif; color: var(--text);
    }
    .modal-box p  { color: var(--dim); font-size: 14px; margin-bottom: 24px; line-height: 1.55; }
    .modal-btns   { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 12px; border-radius: 14px;
      border: none; cursor: pointer; font-size: 14px; font-weight: 700;
      transition: all 0.2s ease; font-family: 'Nunito', sans-serif;
    }
    .modal-btns button:hover  { transform: scale(1.03); }
    .modal-btns button:active { transform: scale(0.97); }
    .btn-confirm {
      background: linear-gradient(135deg, var(--green), #15803d);
      color: #fff;
      box-shadow: 0 4px 12px rgba(22,163,74,0.3);
    }
    .btn-cancel { background: #f1f5f9; color: var(--dim); }

    /* ============================================================
       LOGIN — id="loginScreen"
    ============================================================ */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative; overflow: hidden;
      background: #f0fdf4;
    }

    /* ── Decorative split halves ── */
    .login-deco-left,
    .login-deco-right {
      position: absolute; top: 0; height: 100%; width: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 0; overflow: hidden; pointer-events: none;
    }
    .login-deco-left  { left: 0;  background: var(--green-bg); }
    .login-deco-right { right: 0; background: var(--pink-bg);  }

    .deco-inner      { text-align: center; padding: 24px; user-select: none; }
    .deco-char       {
      font-size: 76px; display: block; line-height: 1; margin-bottom: 14px;
      animation: floatUp 3.5s ease-in-out infinite;
    }
    .deco-jp         {
      font-size: 19px; font-weight: 800; font-style: italic;
      font-family: 'Baloo 2', sans-serif; letter-spacing: 3px; margin-bottom: 10px;
    }
    .login-deco-left  .deco-jp { color: var(--green); }
    .login-deco-right .deco-jp { color: var(--pink);  }
    .deco-emojis { font-size: 22px; letter-spacing: 8px; opacity: 0.60; }

    /* ── Login card ── */
    .login-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%; max-width: 384px;
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 2;
      animation: fadeIn 0.4s ease;
    }
    .login-logo { text-align: center; margin-bottom: 22px; }
    .login-card-header {
      background: linear-gradient(135deg, var(--green-bg), var(--pink-bg));
      border-radius: 16px; padding: 16px 12px; margin-bottom: 4px;
    }
    .login-logo .logo-icon {
      font-size: 52px; display: block; margin-bottom: 8px; line-height: 1;
      animation: floatUp 3s ease-in-out infinite;
    }
    .login-logo h1 {
      font-size: 20px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      background: linear-gradient(135deg, var(--green), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo p  { font-size: 13px; color: var(--dim); margin-top: 6px; font-family: 'Nunito', sans-serif; }

    .chars-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .char-btn {
      flex: 1; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 14px;
      padding: 12px 8px; cursor: pointer; text-align: center;
      transition: all 0.2s ease; color: var(--text); min-height: 80px;
    }
    .char-btn:hover  { border-color: var(--green-l); background: var(--green-bg); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .char-btn.active { border-color: var(--gold); background: var(--gold-bg); }
    .char-btn .char-icon { font-size: 28px; display: block; margin-bottom: 4px; }
    .char-btn .char-name { font-size: 12px; font-weight: 700; color: var(--text); }
    .char-btn .char-role { font-size: 11px; color: var(--dim); }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--dim); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; color: var(--text); font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.12); }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--dim); cursor: pointer; font-size: 16px;
      min-width: 32px; min-height: 32px; display: flex; align-items: center; justify-content: center;
    }
    .login-error {
      background: #fee2e2; border: 1px solid var(--red-l);
      border-radius: 12px; padding: 10px 14px;
      font-size: 13px; color: var(--red); margin-bottom: 16px; display: none; font-weight: 700;
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--green), #15803d);
      color: white; border: none; border-radius: 999px; padding: 14px;
      font-size: 17px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      cursor: pointer; transition: all 0.2s ease; margin-top: 6px;
      box-shadow: 0 4px 16px rgba(22,163,74,0.35);
      letter-spacing: 0.5px; min-height: 50px;
    }
    .btn-login:hover  { transform: scale(1.03); box-shadow: 0 6px 24px rgba(22,163,74,0.45); }
    .btn-login:active { transform: scale(0.97); }

    @media (max-width: 480px) {
      .login-deco-left,
      .login-deco-right { display: none; }
      #loginScreen { background: var(--bg-page); padding: 16px; }
    }

    /* ============================================================
       APP — id="mainApp"
    ============================================================ */
    #mainApp { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
    #mainApp.visible { display: flex; }

    /* ── Header ── */
    .app-header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; box-shadow: var(--shadow-sm);
    }
    .app-header h1 { font-size: 18px; font-weight: 800; font-family: 'Baloo 2', sans-serif; color: var(--green); }
    .header-right  { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      font-size: 12px; color: var(--green); font-weight: 700;
      background: var(--green-bg); border-radius: 999px; padding: 5px 12px;
    }
    .btn-logout {
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--dim); border-radius: 999px;
      padding: 6px 12px; font-size: 13px; cursor: pointer; font-weight: 600;
      transition: all 0.2s ease; min-height: 32px;
    }
    .btn-logout:hover { color: var(--red); border-color: var(--red-l); background: #fee2e2; }
    .btn-refresh {
      background: none; border: none; color: var(--dim);
      font-size: 20px; cursor: pointer; padding: 6px; transition: all 0.2s ease;
      border-radius: 999px; min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-refresh:hover   { background: var(--green-bg); color: var(--green); }
    .btn-refresh.spinning { animation: spin 0.6s linear; }

    /* ── Content area ── */
    .tab-content-area { flex: 1; overflow-y: auto; padding: 16px 16px 80px; background: var(--bg-page); }

    /* ============================================================
       TAB PANELS — class="tab-panel"
    ============================================================ */
    .tab-panel        { display: none; animation: fadeIn 0.25s ease; }
    .tab-panel.active { display: block; }

    /* ── Tab nav ── */
    .tab-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-nav);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 60px; min-height: 60px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 6px; background: none; border: none;
      color: var(--dim); cursor: pointer;
      font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif;
      gap: 2px; transition: color 0.2s; white-space: nowrap;
      position: relative;
    }
    .tab-btn .tab-icon { font-size: 22px; line-height: 1.2; }
    .tab-btn.active    { color: var(--green); }
    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: 5px;
      left: 50%; transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--green); border-radius: 50%;
    }

    /* ── Section title ── */
    .sec-title {
      font-size: 18px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif;
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      color: var(--text);
    }

    /* ============================================================
       TAB: TODAY
    ============================================================ */
    .leaders-banner {
      background: linear-gradient(135deg, var(--green-bg), var(--pink-bg));
      border: 1px solid rgba(22,163,74,0.12);
      border-radius: 20px; padding: 16px;
      margin-bottom: 16px; display: flex; gap: 12px;
      box-shadow: var(--shadow-sm);
    }
    .leader-item {
      flex: 1; background: rgba(255,255,255,0.72);
      border-radius: 14px; padding: 12px 14px;
    }
    .leader-label { font-size: 11px; color: var(--dim); display: block; margin-bottom: 4px; font-weight: 700; }
    .leader-name  { font-size: 15px; font-weight: 800; color: var(--green); font-family: 'Baloo 2', sans-serif; }

    .child-cards { display: flex; flex-direction: column; gap: 14px; }
    .child-card  {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--green);
      border-radius: 20px; padding: 18px;
      box-shadow: var(--shadow-sm);
    }
    .child-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .child-card-avatar { font-size: 40px; line-height: 1; }
    .child-card-info h3   { font-size: 18px; font-weight: 800; font-family: 'Baloo 2', sans-serif; color: var(--text); }
    .child-card-info span { font-size: 12px; color: var(--dim); font-weight: 600; }

    .score-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .score-box {
      border-radius: 16px; padding: 12px 6px; text-align: center;
      border: 1px solid var(--border);
    }
    .score-box:nth-child(1) { background: var(--green-bg); }
    .score-box:nth-child(2) { background: var(--gold-bg);  }
    .score-box:nth-child(3) { background: var(--blue-bg);  }
    .score-box .sv {
      font-size: 22px; font-weight: 800;
      font-family: 'Baloo 2', sans-serif;
      color: var(--green);
    }
    .score-box:nth-child(2) .sv { color: var(--gold); }
    .score-box:nth-child(3) .sv { color: var(--blue); }
    .score-box .sl { font-size: 11px; color: var(--dim); margin-top: 3px; font-weight: 600; }

    .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 6px; font-weight: 700; }
    .prog-bar   { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); border-radius: 999px; transition: width 0.5s ease; }

    /* ============================================================
       TAB: TASKS
    ============================================================ */
    #tab-tasks {
      background: #ffffff;
      margin: -16px -16px 0 -16px;
      padding: 16px 16px 0 16px;
    }

    .cat-filter { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 4px; }
    .cat-filter::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 7px 16px; border-radius: 999px;
      background: #f1f5f9; border: 1px solid transparent;
      color: var(--dim); font-size: 13px; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: all 0.2s ease; min-height: 36px;
    }
    .cat-pill:hover  { background: var(--green-bg); color: var(--green); }
    .cat-pill.active { background: var(--green); border-color: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(22,163,74,0.3); }

    .cat-section       { margin-bottom: 22px; }
    .cat-section-title { font-size: 12px; font-weight: 800; color: var(--dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }

    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .task-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .task-item-head  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .task-name-text  { font-size: 15px; font-weight: 700; color: var(--text); }
    .task-pts-badge  {
      background: var(--gold-bg); color: var(--gold);
      border-radius: 999px; padding: 3px 10px;
      font-size: 12px; font-weight: 800;
      border: 1px solid rgba(245,158,11,0.2);
    }

    .task-checks { display: flex; gap: 8px; flex-wrap: wrap; }
    .check-label {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-surface); border-radius: 10px;
      padding: 8px 14px; cursor: pointer;
      border: 2px solid var(--border);
      transition: all 0.2s ease; user-select: none;
      min-height: 44px;
    }
    .check-label:hover:not(.readonly) { border-color: var(--green-l); transform: scale(1.02); box-shadow: var(--shadow-sm); }
    .check-label.done  { background: var(--green-bg); border-color: var(--green); }
    .check-label input[type="checkbox"] { display: none; }
    .check-box {
      width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; transition: all 0.2s ease; background: white;
    }
    .check-label.done .check-box { background: var(--green); border-color: var(--green); color: white; font-size: 13px; }
    .check-child-name  { font-size: 13px; font-weight: 600; color: var(--text); }
    .check-label.readonly { cursor: default; pointer-events: none; opacity: 0.72; }

    /* ============================================================
       TAB: POINTS
    ============================================================ */
    .points-form {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px;
      box-shadow: var(--shadow-sm); margin-bottom: 4px;
    }
    .form-row   { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; font-weight: 700; color: var(--dim); margin-bottom: 7px; }
    .form-select, .form-input {
      width: 100%; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      padding: 11px 14px; color: var(--text); font-size: 15px;
      font-family: 'Nunito', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-select:focus, .form-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,0.10); }
    .type-toggle { display: flex; gap: 10px; }
    .type-btn {
      flex: 1; padding: 11px; background: var(--bg-surface);
      border: 2px solid var(--border); border-radius: 12px;
      color: var(--dim); cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif;
      transition: all 0.2s ease; min-height: 46px;
    }
    .type-btn:hover  { transform: scale(1.03); }
    .type-btn:active { transform: scale(0.97); }
    .type-btn.active-bonus   { background: var(--green-bg); border-color: var(--green); color: var(--green); box-shadow: 0 2px 8px rgba(22,163,74,0.18); }
    .type-btn.active-penalty { background: #fee2e2; border-color: var(--red); color: var(--red); box-shadow: 0 2px 8px rgba(239,68,68,0.15); }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--green), #15803d);
      color: white; border: none; border-radius: 14px; padding: 14px;
      font-size: 16px; font-weight: 800; font-family: 'Baloo 2', sans-serif;
      cursor: pointer; margin-top: 4px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.28);
      transition: all 0.2s ease; min-height: 48px;
    }
    .btn-submit:hover  { transform: scale(1.02); box-shadow: 0 6px 20px rgba(22,163,74,0.38); }
    .btn-submit:active { transform: scale(0.97); }

    .recent-tx { margin-top: 20px; }
    .tx-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--bg-card);
      border-radius: 14px; border: 1px solid var(--border);
      margin-bottom: 8px; font-size: 13px;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .tx-item:hover { box-shadow: var(--shadow-md); }
    .tx-left .tx-name { font-weight: 700; color: var(--text); }
    .tx-left .tx-meta { font-size: 11px; color: var(--dim); margin-top: 3px; font-weight: 600; }
    .tx-pts     { font-weight: 800; font-size: 16px; font-family: 'Baloo 2', sans-serif; }
    .tx-pts.pos { color: var(--green); }
    .tx-pts.neg { color: var(--red); }

    /* ============================================================
       TAB: REWARDS
    ============================================================ */
    .rewards-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
    .reward-card  {
      background: var(--bg-card); border: 2px solid var(--pink-l);
      border-radius: 20px; padding: 18px 14px; text-align: center;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .reward-card:hover { box-shadow: 0 6px 20px rgba(236,72,153,0.15); transform: translateY(-2px); }
    .reward-icon  {
      font-size: 30px;
      background: var(--pink-bg);
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .reward-name  { font-size: 14px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .reward-pts   { font-size: 13px; color: var(--gold); font-weight: 800; margin-bottom: 12px; }
    .btn-redeem   {
      width: 100%; padding: 9px;
      background: linear-gradient(135deg, var(--pink), #be185d);
      border: none; color: white; border-radius: 999px;
      font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 3px 10px rgba(236,72,153,0.28);
    }
    .btn-redeem:hover:not(:disabled)  { transform: scale(1.05); box-shadow: 0 5px 16px rgba(236,72,153,0.42); }
    .btn-redeem:active:not(:disabled) { transform: scale(0.97); }
    .btn-redeem:disabled { opacity: 0.4; cursor: not-allowed; background: var(--dim); box-shadow: none; }
    .redeem-history { margin-top: 20px; }

    /* ============================================================
       TAB: RANKINGS
    ============================================================ */
    .rank-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .rank-card  {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-sm); transition: all 0.2s ease;
    }
    .rank-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .rank-card:nth-child(1) { border: 2px solid var(--gold); background: var(--gold-bg); box-shadow: 0 4px 16px rgba(245,158,11,0.18); }
    .rank-card:nth-child(2) { border: 2px solid #cbd5e1; }
    .rank-card:nth-child(3) { border: 2px solid #cd7f32; }
    .rank-num   { font-size: 26px; font-weight: 900; min-width: 40px; text-align: center; font-family: 'Baloo 2', sans-serif; }
    .rank-num.r1 { color: var(--gold); }
    .rank-num.r2 { color: #94a3b8; }
    .rank-num.r3 { color: #cd7f32; }
    .rank-info   { flex: 1; }
    .rank-info h3   { font-size: 16px; font-weight: 800; color: var(--text); font-family: 'Baloo 2', sans-serif; }
    .rank-info span { font-size: 12px; color: var(--dim); font-weight: 600; }
    .rank-score { font-size: 20px; font-weight: 800; color: var(--gold); font-family: 'Baloo 2', sans-serif; }

    .compare-section {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 16px; box-shadow: var(--shadow-sm);
    }
    .compare-row     { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
    .compare-label   { font-size: 12px; color: var(--dim); min-width: 80px; font-weight: 700; }
    .compare-bar-wrap  { flex: 1; }
    .compare-bar-track { height: 12px; background: #e2e8f0; border-radius: 999px; overflow: hidden; display: flex; }
    .cbar    { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .cbar.c1 { background: var(--green); }
    .cbar.c2 { background: var(--pink);  }
    .cbar.c3 { background: var(--blue);  }
    .cbar.c4 { background: var(--gold);  }
    .compare-values { display: flex; gap: 10px; margin-top: 5px; font-size: 11px; color: var(--dim); font-weight: 600; flex-wrap: wrap; }

    /* ============================================================
       TAB: HISTORY
    ============================================================ */
    .chart-wrap  {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 16px; margin-bottom: 16px;
      overflow-x: auto; box-shadow: var(--shadow-sm);
    }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); font-family: 'Baloo 2', sans-serif; }
    .bar-chart   { display: flex; gap: 4px; align-items: flex-end; height: 120px; min-width: 280px; }
    .bar-group   { flex: 1; display: flex; gap: 2px; align-items: flex-end; position: relative; }
    .bar         { border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.5s ease; }
    .bar.b1      { background: var(--red);   flex: 1; }
    .bar.b2      { background: var(--blue);  flex: 1; }
    .bar.b3      { background: var(--green); flex: 1; }
    .bar-date    { position: absolute; bottom: -20px; width: 100%; text-align: center; font-size: 9px; color: var(--dim); white-space: nowrap; font-weight: 700; }
    .chart-legend { display: flex; gap: 16px; margin-top: 26px; font-size: 12px; color: var(--dim); flex-wrap: wrap; font-weight: 700; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

    /* ============================================================
       TAB: SETTINGS
    ============================================================ */
    .settings-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 20px; padding: 18px; margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .settings-card h3 { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: var(--green); font-family: 'Baloo 2', sans-serif; }
    .btn-setting {
      width: 100%; padding: 13px 16px; background: #f8fafc;
      border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; font-size: 14px; font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer; text-align: left; margin-bottom: 8px;
      transition: all 0.2s ease; min-height: 46px;
    }
    .btn-setting:hover  { background: var(--green-bg); border-color: var(--green); color: var(--green); transform: translateX(3px); }
    .btn-setting:active { transform: scale(0.98); }
    .btn-setting.danger { border-color: rgba(239,68,68,0.25); color: var(--red); }
    .btn-setting.danger:hover { background: #fee2e2; border-color: var(--red); color: var(--red); transform: translateX(3px); }
    .add-task-form, .add-reward-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state { text-align: center; padding: 36px 20px; color: var(--dim); }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; display: block; opacity: 0.65; }
    .empty-state p { font-size: 15px; font-weight: 700; }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (min-width: 600px) {
      .child-cards  { flex-direction: row; flex-wrap: wrap; }
      .child-card   { flex: 1; min-width: 260px; }
      .rewards-grid { grid-template-columns: repeat(3,1fr); }
    }
    @media (max-width: 380px) {
      .score-box .sv { font-size: 18px; }
      .rewards-grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <span>⚔️ Đang tải...</span>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">Xác nhận</h3>
    <p  id="modal-body">Bạn chắc chắn muốn thực hiện thao tác này?</p>
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeModal()">❌ Hủy</button>
      <button class="btn-confirm" id="modal-ok">✅ Xác nhận</button>
    </div>
  </div>
</div>

<!-- ✅ LOGIN — id="loginScreen" -->
<div id="loginScreen">

  <!-- Tanjiro — bên trái -->
  <div class="login-deco-left" aria-hidden="true">
    <div class="deco-inner">
      <span class="deco-char">⚔️</span>
      <div class="deco-jp">水の呼吸</div>
      <div class="deco-emojis">🌿🗡️🌊</div>
    </div>
  </div>

  <!-- Nezuko — bên phải -->
  <div class="login-deco-right" aria-hidden="true">
    <div class="deco-inner">
      <span class="deco-char">🌸</span>
      <div class="deco-jp">鬼滅の刃</div>
      <div class="deco-emojis">🌸💮🎋</div>
    </div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-card-header">
        <span class="logo-icon">🏆</span>
        <h1>⚔️ Bảng Điểm Diệt Quỷ</h1>
        <p>Kimetsu no Yaiba · Hành trình chinh phục 🌸</p>
      </div>
    </div>
    <div class="chars-row" id="chars-row"></div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="login-error" id="login-error">❌ Tên đăng nhập hoặc mật khẩu không đúng!</div>
      <div class="form-group">
        <label>🧑‍🚀 Tên đăng nhập</label>
        <div class="input-wrap">
          <input id="inp-user" type="text" placeholder="username" autocomplete="username" />
        </div>
      </div>
      <div class="form-group">
        <label>🔐 Mật khẩu</label>
        <div class="input-wrap">
          <input id="inp-pass" type="password" placeholder="password" autocomplete="current-password" />
          <button type="button" class="pw-toggle" onclick="togglePw()">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-login">🗡️ Bắt Đầu Hành Trình</button>
    </form>
  </div>
</div>

<!-- ✅ APP — id="mainApp" -->
<div id="mainApp">
  <div class="app-header">
    <h1>🏆 Bảng Điểm</h1>
    <div class="header-right">
      <!-- ✅ id="currentUser" -->
      <span class="user-badge" id="currentUser">...</span>
      <button class="btn-refresh" id="btn-refresh" onclick="doRefresh()" title="Làm mới">🔄</button>
      <button class="btn-logout"  onclick="handleLogout()">🚪</button>
    </div>
  </div>

  <div class="tab-content-area">
    <!-- ✅ class="tab-panel" -->
    <div id="tab-today"    class="tab-panel active"></div>
    <div id="tab-tasks"    class="tab-panel"></div>
    <div id="tab-points"   class="tab-panel"></div>
    <div id="tab-rewards"  class="tab-panel"></div>
    <div id="tab-rankings" class="tab-panel"></div>
    <div id="tab-history"  class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="today"    onclick="switchTab('today')">
      <span class="tab-icon">⚔️</span>Hôm nay
    </button>
    <button class="tab-btn" data-tab="tasks"    onclick="switchTab('tasks')">
      <span class="tab-icon">📜</span>Nhiệm vụ
    </button>
    <button class="tab-btn" data-tab="points"   onclick="switchTab('points')">
      <span class="tab-icon">💎</span>Điểm
    </button>
    <button class="tab-btn" data-tab="rewards"  onclick="switchTab('rewards')">
      <span class="tab-icon">🌸</span>Thưởng
    </button>
    <button class="tab-btn" data-tab="rankings" onclick="switchTab('rankings')">
      <span class="tab-icon">🏆</span>Xếp hạng
    </button>
    <button class="tab-btn" data-tab="history"  onclick="switchTab('history')">
      <span class="tab-icon">📅</span>Lịch sử
    </button>
    <button class="tab-btn" id="tab-btn-settings" data-tab="settings"
            onclick="switchTab('settings')" style="display:none">
      <span class="tab-icon">🗡️</span>Cài đặt
    </button>
  </nav>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxJwpMxT1gMADbf8CGcCZDkRsX68uwHh4_1lquJ8ryg3icDns4LEVByTVFyMtJEXsqo/exec';

let S = {
  token:        localStorage.getItem('fq_token') || null,
  user:         JSON.parse(localStorage.getItem('fq_user') || 'null'),
  children:     [],
  tasks:        [],
  rewards:      [],
  transactions: [],
  dailyStatus:  [],
  redemptions:  [],
  today:        '',
  week_start:   '',
  activeTab:    'today',
  taskFilter:   'all'
};

// ============================================================
// API
// ============================================================
async function api(action, payload = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action, token: S.token, payload })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ============================================================
// FETCH DATA
// ============================================================
async function fetchData(silent = false) {
  if (!silent) showLoad(true);
  try {
    const r = await api('getInitialData');
    if (r.success) {
      S.children     = (r.children     || []).filter(c => c.status === 'active' || !c.status);
      S.tasks        = (r.tasks        || []).filter(t => t.status === 'active');
      S.rewards      = (r.rewards      || []).filter(rw => rw.status === 'active');
      S.transactions = r.transactions  || [];
      S.dailyStatus  = r.dailyStatus   || [];
      S.redemptions  = r.redemptions   || [];
      S.today        = r.today         || '';
      S.week_start   = r.week_start    || '';
      renderTab(S.activeTab);
    } else {
      if (!silent) toast(r.message || 'Không tải được dữ liệu', 'error');
    }
  } catch(e) {
    console.error('fetchData error:', e); // ✅ luôn log dù silent
    if (!silent) toast('⚠️ Không kết nối được server', 'error');
  }
  if (!silent) showLoad(false);
}

async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  await fetchData(true);
  btn.classList.remove('spinning');
  toast('Đã làm mới dữ liệu ✅', 'success');
}

// ============================================================
// SCORE / TASK HELPERS
// ============================================================
function childScore(childId) {
  const c = S.children.find(x => String(x.child_id) === String(childId));
  if (!c) return { today_score:0, week_score:0, total_score:0, earned_score:0, daily_target:50 };
  return {
    today_score:  Number(c.today_score  || 0),
    week_score:   Number(c.week_score   || 0),
    total_score:  Number(c.total_score  || 0),
    earned_score: Number(c.earned_score || 0),
    daily_target: Number(c.daily_target || 50)
  };
}

function isTaskDone(childId, taskId) {
  return S.dailyStatus.some(ds =>
    String(ds.child_id) === String(childId) &&
    String(ds.task_id)  === String(taskId)  &&
    (ds.status === 'done' || ds.status === 'completed')
  );
}

function taskAppliesTo(task, child) {
  const at = String(task.assigned_to || 'both').toLowerCase();
  if (at === 'both') return true;
  return at === String(child.child_id).toLowerCase() ||
         at === String(child.child_key || '').toLowerCase();
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value.trim();
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!username || !password) { toast('Nhập username và password', 'warn'); return; }
  showLoad(true);
  try {
    const r = await api('login', { username, password });
    if (r.success) {
      S.token = r.token;
      S.user  = { user_id: r.user_id, username: r.username, display_name: r.display_name, role: r.role, child_id: r.child_id || null };
      localStorage.setItem('fq_token', r.token);
      localStorage.setItem('fq_user',  JSON.stringify(S.user));
      showApp();
      await fetchData(true);
    } else {
      errEl.style.display = 'block';
    }
  } catch(err) {
    toast('⚠️ Không kết nối được server', 'error');
  }
  showLoad(false);
}

function handleLogout() {
  S.token = null; S.user = null;
  localStorage.removeItem('fq_token');
  localStorage.removeItem('fq_user');
  showLogin();
}

function togglePw() {
  const inp = document.getElementById('inp-pass');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}

// ============================================================
// SESSION RESTORE
// ============================================================
async function init() {
  buildLoginChars();
  if (S.token && S.user) {
    try {
      const r = await api('validateSession');
      if (r.success) {
        S.user = { user_id: r.user_id, username: r.username, display_name: r.display_name, role: r.role, child_id: r.child_id };
        localStorage.setItem('fq_user', JSON.stringify(S.user));
        showApp();
        await fetchData(true);
        return;
      }
    } catch(e) { console.error('validateSession error:', e); }
    S.token = null; S.user = null;
    localStorage.removeItem('fq_token');
    localStorage.removeItem('fq_user');
  }
  showLogin();
}

function buildLoginChars() {
  const row = document.getElementById('chars-row');
  const chars = [
    { icon: '⚔️', name: 'Bố / Mẹ',  role: 'admin / scorer' },
    { icon: '🌸', name: 'Các bé',    role: 'viewer' }
  ];
  row.innerHTML = chars.map(c => `
    <div class="char-btn">
      <span class="char-icon">${c.icon}</span>
      <span class="char-name">${c.name}</span>
      <span class="char-role">${c.role}</span>
    </div>
  `).join('');
}

// ============================================================
// UI HELPERS
// ============================================================
function showLogin() {
  // ✅ dùng id mới
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').classList.remove('visible');
}

function showApp() {
  // ✅ dùng id mới
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').classList.add('visible');
  document.getElementById('currentUser').textContent =
    (S.user?.display_name || '?') + ' · ' + (S.user?.role || '');

  const settingsBtn = document.getElementById('tab-btn-settings');
  if (settingsBtn) {
    settingsBtn.style.display =
      (S.user?.role === 'admin' || S.user?.role === 'scorer') ? '' : 'none';
  }
  switchTab('today');
}

function showLoad(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

let toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type; // ← không prefix 'toast'
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ✅ switchTab — fix typo + dùng .tab-panel + active class
function switchTab(tab) {
  console.log('switchTab →', tab); // ✅ tab, không phải tabName
  S.activeTab = tab;

  // Toggle nav buttons
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );

  // ✅ Toggle tab panels bằng class active
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'tab-' + tab)
  );

  renderTab(tab);
}

function renderTab(tab) {
  console.log('renderTab →', tab);
  switch (tab) {
    case 'today':    renderToday();    break;
    case 'tasks':    renderTasks();    break;
    case 'points':   renderPoints();   break;
    case 'rewards':  renderRewards();  break;
    case 'rankings': renderRankings(); break;
    case 'history':  renderHistory();  break;
    case 'settings': renderSettings(); break;
    default: console.warn('renderTab: unknown tab =', tab);
  }
}

// Modal
let modalCb = null;
function confirm(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  modalCb = cb;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('modal-ok').onclick = () => { closeModal(); if (modalCb) modalCb(); };
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function fmtDate(d) {
  if (!d) return '';
  const s     = String(d).substring(0, 10);
  const parts = s.split('-');
  return `${parts[2]}/${parts[1]}`;
}
function fmtDatetime(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d).substring(0,16);
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
}

// ============================================================
// RENDER: TODAY
// ============================================================
function renderToday() {
  const el = document.getElementById('tab-today');
  if (!S.children.length) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">🌸</div><p>Đang tải dữ liệu...</p></div>';
    return;
  }
  const scored      = S.children.map(c => ({ ...c, ...childScore(c.child_id) }));
  const todayLeader = scored.reduce((a,b) => a.today_score >= b.today_score ? a : b);
  const weekLeader  = scored.reduce((a,b) => a.week_score  >= b.week_score  ? a : b);

  let html = `
    <div class="sec-title">⚔️ Hôm Nay · ${fmtDate(S.today)}</div>
    <div class="leaders-banner">
      <div class="leader-item">
        <span class="leader-label">⚔️ Dẫn đầu hôm nay</span>
        <span class="leader-name">${todayLeader.avatar_icon || '⭐'} ${todayLeader.child_name}</span>
      </div>
      <div class="leader-item">
        <span class="leader-label">🏆 Dẫn đầu tuần</span>
        <span class="leader-name">${weekLeader.avatar_icon || '⭐'} ${weekLeader.child_name}</span>
      </div>
    </div>
    <div class="child-cards">
  `;

  scored.forEach(c => {

      <div class="child-card">
        <div class="child-card-head">

        </div>

          <div class="score-box"><div class="sv">${c.today_score}</div><div class="sl">⚔️ Hôm nay</div></div>
          <div class="score-box"><div class="sv">${c.week_score}</div><div class="sl">📅 Tuần này</div></div>
          <div class="score-box"><div class="sv" style="color:var(--blue)">${c.total_score} ⭐</div><div class="sl">Ngôi sao</div></div>
        </div>
        <div class="prog-wrap">
          <div class="prog-label"><span>Tiến độ hôm nay</span><span>${c.today_score} / ${c.daily_target}</span></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>

}

function renderTasks() {
  const el         = document.getElementById('tab-tasks');
  const canInteract = S.user?.role === 'admin' || S.user?.role === 'scorer';

  const cats = [
    { key: 'all',                  label: '🔍 Tất cả' },
    { key: 'Tác phong hằng ngày',  label: '🌅 Tác phong' },
    { key: 'Việc nhà',             label: '🏠 Việc nhà' },
    { key: 'Học tập',              label: '📚 Học tập' },
    { key: 'Điểm phát sinh',       label: '⚡ Phát sinh' },
    { key: 'Thành tích',           label: '🏆 Thành tích' }
  ];

  const activeTasks = S.tasks.filter(t => S.taskFilter === 'all' || t.category === S.taskFilter);
  const groups = {};
  activeTasks.forEach(t => {
    const cat = t.category || 'Khác';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(t);
  });

  let html = `
    <div class="sec-title">📜 Nhiệm Vụ Hôm Nay</div>
    <div class="cat-filter">
      ${cats.map(c => `
        <div class="cat-pill ${S.taskFilter === c.key ? 'active' : ''}"
             onclick="setTaskFilter('${c.key}')">${c.label}</div>
      `).join('')}
    </div>
  `;

  if (!activeTasks.length) {
    html += '<div class="empty-state"><div class="es-icon">📜</div><p>Không có nhiệm vụ nào</p></div>';
    el.innerHTML = html; return;
  }

  Object.entries(groups).forEach(([cat, tasks]) => {
    html += `<div class="cat-section"><div class="cat-section-title">${cat}</div>`;
    tasks.forEach(task => {
      const applicable = S.children.filter(c => taskAppliesTo(task, c));
      if (!applicable.length) return;
      html += `
        <div class="task-item">
          <div class="task-item-head">
            <span class="task-name-text">${task.task_name}</span>
            <span class="task-pts-badge">+${task.points} ⭐</span>
          </div>
          <div class="task-checks">
      `;
      applicable.forEach(child => {
        const done = isTaskDone(child.child_id, task.task_id);
        const ro   = !canInteract ? 'readonly' : '';
        html += `
          <label class="check-label ${done ? 'done' : ''} ${ro}"
                 id="lbl-${child.child_id}-${task.task_id}"
                 onclick="${canInteract ? `handleTaskToggle('${child.child_id}','${task.task_id}',${done})` : ''}">
            <div class="check-box">${done ? '✓' : ''}</div>
            <span class="check-child-name">${child.avatar_icon || ''} ${child.child_name}</span>
          </label>
        `;
      });
      html += `</div></div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

function setTaskFilter(key) { S.taskFilter = key; renderTasks(); }

async function handleTaskToggle(childId, taskId, isDone) {
  if (S.user?.role !== 'admin' && S.user?.role !== 'scorer') return;
  const child = S.children.find(c => String(c.child_id) === String(childId));
  const task  = S.tasks.find(t => String(t.task_id)  === String(taskId));
  if (!child || !task) return;

  const lbl = document.getElementById(`lbl-${childId}-${taskId}`);
  if (lbl) { lbl.style.opacity = '0.5'; lbl.style.pointerEvents = 'none'; }
  showLoad(true);
  try {
    const action = isDone ? 'undoTask' : 'completeTask';
    const r = await api(action, { child_id: childId, task_id: taskId });
    if (r.success) {
      toast(isDone ? `↩️ ${child.child_name}: -${task.points} ⭐` : `✅ ${child.child_name}: +${task.points} ⭐`, isDone ? 'warn' : 'success');
      await fetchData(true);
    } else {
      toast(r.message, 'error');
      if (lbl) { lbl.style.opacity = ''; lbl.style.pointerEvents = ''; }
    }
  } catch(e) {
    toast('Lỗi kết nối', 'error');
    if (lbl) { lbl.style.opacity = ''; lbl.style.pointerEvents = ''; }
  }
  showLoad(false);
}

async function submitBonusPenalty() {

  if (!pts || pts<=0){ toast('Nhập số điểm hợp lệ', 'warn'); return; }

  showLoad(true);
  try {
    const r = await api('addBonusPenalty', { child_id: childId, type, note, points: pts });
    if (r.success) {
      toast(r.message, 'success');
      document.getElementById('bp-note').value = '';
      document.getElementById('bp-pts').value  = '';
      await fetchData(true);
    } else { toast(r.message, 'error'); }
  } catch(e) { toast('Lỗi kết nối', 'error'); }

}

    '🌸 Xác nhận đổi thưởng',
    `${child.child_name} đổi "${reward.reward_name}" tốn ${reward.required_points} ⭐`,

      showLoad(true);
      try {
        const r = await api('redeemReward', { child_id: childId, reward_id: rewardId });
        if (r.success) { toast(r.message, 'success'); await fetchData(true); }
        else             toast(r.message, 'error');

    <div class="rank-card">

        <span class="compare-label">${labels[metric]}</span>
        <div class="compare-bar-wrap">
          <div class="compare-bar-track">

}

function renderHistory() {
  const el = document.getElementById('tab-history');
  if (!S.children.length || !S.today) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">📅</div><p>Đang tải...</p></div>';
    return;
  }
  const days    = 7;
  const dayData = [];
  for (let i = days-1; i >= 0; i--) {
    const d  = new Date(S.today + 'T00:00:00');
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().substring(0,10);
    const entry = { date: ds, short: `${d.getDate()}/${d.getMonth()+1}`, scores: {} };
    S.children.forEach(c => {
      entry.scores[c.child_id] = S.transactions
        .filter(tx => String(tx.child_id) === String(c.child_id) && String(tx.date).substring(0,10) === ds)
        .reduce((sum,tx) => sum + Number(tx.points || 0), 0);
    });
    dayData.push(entry);
  }

  const allVals  = dayData.flatMap(d => Object.values(d.scores));
  const maxVal   = Math.max(...allVals, 1);
  const colors   = ['var(--red)','var(--blue)','var(--green)'];

  const barsHtml = dayData.map(d => {
    const childBars = S.children.map((c,i) => {
      const h = Math.max(4, Math.round((d.scores[c.child_id] / maxVal) * 100));
      return `<div class="bar b${i+1}" style="height:${h}px" title="${c.child_name}: ${d.scores[c.child_id]}"></div>`;
    }).join('');
    return `<div class="bar-group">${childBars}<span class="bar-date">${d.short}</span></div>`;
  }).join('');

  const legendHtml = S.children.map((c,i) => `
    <span><span class="legend-dot" style="background:${colors[i]||'#fff'}"></span>${c.child_name}</span>
  `).join('');

  const recentTx = S.transactions.slice(0,30);
  const txHtml   = recentTx.length ? recentTx.map(tx => {
    const pts = Number(tx.points || 0);
    return `
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-name">${tx.child_name || ''} · ${tx.note || tx.task_name || tx.type || ''}</div>
          <div class="tx-meta">${fmtDatetime(tx.created_at)} · ${tx.created_by_name || ''}</div>
        </div>
        <div class="tx-pts ${pts >= 0 ? 'pos' : 'neg'}">${pts >= 0 ? '+' : ''}${pts}</div>
      </div>
    `;
  }).join('') : '<div class="empty-state"><div class="es-icon">📜</div><p>Chưa có dữ liệu</p></div>';

  el.innerHTML = `
    <div class="sec-title">📅 Lịch Sử</div>
    <div class="chart-wrap">
      <div class="chart-title">📈 Biểu Đồ 7 Ngày Gần Đây</div>
      <div class="bar-chart">${barsHtml}</div>
      <div class="chart-legend">${legendHtml}</div>
    </div>
    <div class="sec-title">📜 Giao Dịch Gần Đây</div>
    ${txHtml}
  `;
}

  });
}

async function doResetWeek() {
  confirm('🗑️ Đặt lại điểm tuần?','⚠️ Sẽ xóa toàn bộ giao dịch tuần này. Không thể hoàn tác!', async () => {
    showLoad(true);
    try {
      const r = await api('resetWeek');
      if (r.success) { toast(r.message,'success'); await fetchData(true); }
      else             toast(r.message,'error');
    } catch(e) { toast('Lỗi kết nối','error'); }
    showLoad(false);
  });
}

init();
</script>
